<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elevia 3D - Contextual UI</title>
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0c0c0c;
            --surface: rgba(24, 24, 24, 0.95);
            --surface-solid: #181818;
            --glass: rgba(255, 255, 255, 0.06);
            --glass-border: rgba(255, 255, 255, 0.1);
            --text: #f5f5f5;
            --text-dim: #777;
            --accent: #00d4aa;
            --accent-glow: rgba(0, 212, 170, 0.3);
            --warning: #ffd93d;
            --danger: #ff6b6b;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Sora', sans-serif;
            background: var(--bg);
            color: var(--text);
            height: 500vh;
            font-size: 12px;
            overflow-x: hidden;
            cursor: default;
        }

        /* Full-screen canvas */
        #canvas-container {
            position: fixed;
            inset: 0;
            z-index: 1;
        }
        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }

        /* Minimal top bar */
        #topbar {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--surface);
            backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 50px;
            padding: 8px 8px 8px 20px;
            display: flex;
            align-items: center;
            gap: 12px;
            z-index: 100;
        }
        .topbar-logo {
            font-weight: 600;
            font-size: 13px;
            color: var(--accent);
        }
        .topbar-divider {
            width: 1px;
            height: 20px;
            background: var(--glass-border);
        }
        .topbar-input {
            width: 260px;
            padding: 10px 14px;
            background: var(--glass);
            border: 1px solid transparent;
            border-radius: 30px;
            color: var(--text);
            font-size: 11px;
            font-family: inherit;
        }
        .topbar-input:focus {
            outline: none;
            border-color: var(--accent);
        }
        .topbar-btn {
            padding: 10px 20px;
            background: var(--accent);
            border: none;
            border-radius: 30px;
            color: var(--bg);
            font-size: 11px;
            font-weight: 600;
            cursor: pointer;
            font-family: inherit;
        }
        .topbar-btn:hover {
            filter: brightness(1.1);
        }

        /* Floating status pill */
        #status-pill {
            position: fixed;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--surface);
            backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 50px;
            padding: 10px 24px;
            display: flex;
            align-items: center;
            gap: 20px;
            z-index: 100;
            font-size: 11px;
        }
        .status-item {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .status-dot {
            width: 8px;
            height: 8px;
            background: var(--text-dim);
            border-radius: 50%;
            transition: all 0.2s;
        }
        .status-dot.active {
            background: var(--accent);
            box-shadow: 0 0 12px var(--accent-glow);
        }
        .status-value {
            font-weight: 600;
            font-variant-numeric: tabular-nums;
            color: var(--accent);
        }
        .status-key {
            padding: 4px 10px;
            background: var(--glass);
            border-radius: 4px;
            font-size: 10px;
            color: var(--text-dim);
        }

        /* Floating corner tools */
        .corner-tools {
            position: fixed;
            display: flex;
            flex-direction: column;
            gap: 8px;
            z-index: 100;
        }
        .corner-tools.left { left: 20px; top: 50%; transform: translateY(-50%); }
        .corner-tools.right { right: 20px; top: 50%; transform: translateY(-50%); }
        
        .tool-btn {
            width: 44px;
            height: 44px;
            background: var(--surface);
            backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 12px;
            color: var(--text-dim);
            font-size: 16px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }
        .tool-btn:hover {
            background: var(--glass);
            color: var(--text);
            border-color: var(--accent);
        }
        .tool-btn.active {
            background: var(--accent);
            color: var(--bg);
            border-color: var(--accent);
        }
        .tool-btn.danger:hover {
            border-color: var(--danger);
            color: var(--danger);
        }

        /* Context menu - appears near selected object */
        #context-menu {
            position: fixed;
            background: var(--surface);
            backdrop-filter: blur(30px);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            padding: 12px;
            z-index: 200;
            display: none;
            min-width: 280px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.5);
        }
        #context-menu.show { display: block; }
        
        .ctx-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding-bottom: 10px;
            border-bottom: 1px solid var(--glass-border);
            margin-bottom: 12px;
        }
        .ctx-title {
            font-weight: 600;
            font-size: 13px;
        }
        .ctx-close {
            width: 24px;
            height: 24px;
            background: transparent;
            border: none;
            border-radius: 6px;
            color: var(--text-dim);
            cursor: pointer;
            font-size: 14px;
        }
        .ctx-close:hover { background: var(--glass); color: var(--text); }

        .ctx-section {
            margin-bottom: 14px;
        }
        .ctx-section:last-child { margin-bottom: 0; }
        .ctx-section-title {
            font-size: 9px;
            font-weight: 600;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 8px;
        }
        .ctx-row {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 6px;
            margin-bottom: 6px;
        }
        .ctx-input-group {
            position: relative;
        }
        .ctx-input-label {
            position: absolute;
            left: 10px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 10px;
            font-weight: 600;
            color: var(--text-dim);
            pointer-events: none;
        }
        .ctx-input-label.x { color: #ff6b6b; }
        .ctx-input-label.y { color: #4ecdc4; }
        .ctx-input-label.z { color: #a29bfe; }
        .ctx-input {
            width: 100%;
            padding: 10px 10px 10px 28px;
            background: var(--glass);
            border: 1px solid transparent;
            border-radius: 8px;
            color: var(--text);
            font-size: 11px;
            font-family: inherit;
            font-variant-numeric: tabular-nums;
        }
        .ctx-input:focus {
            outline: none;
            border-color: var(--accent);
        }
        .ctx-slider-row {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .ctx-slider-label {
            font-size: 10px;
            color: var(--text-dim);
            width: 50px;
        }
        .ctx-slider {
            flex: 1;
            height: 6px;
            -webkit-appearance: none;
            background: var(--glass);
            border-radius: 3px;
        }
        .ctx-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 16px;
            height: 16px;
            background: var(--accent);
            border-radius: 50%;
            cursor: pointer;
            box-shadow: 0 2px 8px var(--accent-glow);
        }
        .ctx-slider-value {
            width: 40px;
            text-align: right;
            font-size: 11px;
            font-weight: 500;
            color: var(--accent);
        }
        .ctx-select {
            width: 100%;
            padding: 10px 12px;
            background: var(--glass);
            border: 1px solid transparent;
            border-radius: 8px;
            color: var(--text);
            font-size: 11px;
            font-family: inherit;
            cursor: pointer;
        }
        .ctx-select:focus {
            outline: none;
            border-color: var(--accent);
        }
        .ctx-btn-row {
            display: flex;
            gap: 8px;
        }
        .ctx-btn {
            flex: 1;
            padding: 10px;
            background: var(--glass);
            border: 1px solid var(--glass-border);
            border-radius: 8px;
            color: var(--text);
            font-size: 11px;
            font-weight: 500;
            cursor: pointer;
            font-family: inherit;
        }
        .ctx-btn:hover {
            background: var(--surface-solid);
            border-color: var(--accent);
        }
        .ctx-btn.primary {
            background: var(--accent);
            border-color: var(--accent);
            color: var(--bg);
        }
        .ctx-btn.danger {
            color: var(--danger);
        }
        .ctx-btn.danger:hover {
            border-color: var(--danger);
        }

        /* Object selector popup */
        #object-selector {
            position: fixed;
            top: 80px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--surface);
            backdrop-filter: blur(30px);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            padding: 16px;
            z-index: 200;
            display: none;
            width: 320px;
            max-height: 400px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.5);
        }
        #object-selector.show { display: block; }
        .obj-selector-title {
            font-size: 13px;
            font-weight: 600;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .obj-list {
            max-height: 300px;
            overflow-y: auto;
        }
        .obj-item {
            padding: 12px 14px;
            background: var(--glass);
            border: 1px solid transparent;
            border-radius: 10px;
            margin-bottom: 6px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 10px;
            transition: all 0.15s;
        }
        .obj-item:hover {
            border-color: var(--accent);
        }
        .obj-item.selected {
            background: var(--accent-glow);
            border-color: var(--accent);
        }
        .obj-icon {
            width: 32px;
            height: 32px;
            background: var(--glass);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
        }
        .obj-info {
            flex: 1;
        }
        .obj-name {
            font-weight: 500;
            font-size: 12px;
        }
        .obj-type {
            font-size: 10px;
            color: var(--text-dim);
        }
        .obj-kf-count {
            font-size: 10px;
            color: var(--accent);
            background: var(--accent-glow);
            padding: 4px 8px;
            border-radius: 20px;
        }

        /* Keyframe list popup */
        #keyframe-list {
            position: fixed;
            right: 80px;
            top: 50%;
            transform: translateY(-50%);
            background: var(--surface);
            backdrop-filter: blur(30px);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            padding: 12px;
            z-index: 150;
            display: none;
            width: 200px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.5);
        }
        #keyframe-list.show { display: block; }
        .kf-list-title {
            font-size: 11px;
            font-weight: 600;
            color: var(--text-dim);
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .kf-item {
            padding: 10px 12px;
            background: var(--glass);
            border: 1px solid transparent;
            border-radius: 8px;
            margin-bottom: 6px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: space-between;
            transition: all 0.15s;
        }
        .kf-item:hover {
            border-color: var(--accent);
        }
        .kf-item.selected {
            background: var(--accent-glow);
            border-color: var(--accent);
        }
        .kf-name {
            font-size: 11px;
            font-weight: 500;
        }
        .kf-scroll {
            font-size: 10px;
            color: var(--accent);
            font-weight: 600;
        }
        .add-kf-btn {
            width: 100%;
            padding: 10px;
            background: transparent;
            border: 1px dashed var(--glass-border);
            border-radius: 8px;
            color: var(--text-dim);
            font-size: 11px;
            cursor: pointer;
            font-family: inherit;
        }
        .add-kf-btn:hover {
            border-color: var(--accent);
            color: var(--accent);
        }

        /* Breakpoint selector */
        #bp-selector {
            position: fixed;
            top: 20px;
            right: 20px;
            background: var(--surface);
            backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 30px;
            padding: 4px;
            display: flex;
            gap: 4px;
            z-index: 100;
        }
        .bp-btn {
            padding: 8px 14px;
            background: transparent;
            border: none;
            border-radius: 26px;
            color: var(--text-dim);
            font-size: 10px;
            font-weight: 500;
            cursor: pointer;
            font-family: inherit;
            transition: all 0.2s;
        }
        .bp-btn:hover {
            color: var(--text);
        }
        .bp-btn.active {
            background: var(--accent);
            color: var(--bg);
        }

        /* Export modal */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.8);
            z-index: 300;
            display: none;
            align-items: center;
            justify-content: center;
        }
        .modal-overlay.show { display: flex; }
        .modal {
            background: var(--surface-solid);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            width: 500px;
            max-width: 90vw;
            overflow: hidden;
        }
        .modal-header {
            padding: 18px 20px;
            border-bottom: 1px solid var(--glass-border);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .modal-title { font-size: 15px; font-weight: 600; }
        .modal-close {
            width: 32px;
            height: 32px;
            background: var(--glass);
            border: none;
            border-radius: 8px;
            color: var(--text-dim);
            cursor: pointer;
            font-size: 16px;
        }
        .modal-close:hover { background: var(--surface); color: var(--text); }
        .modal-body {
            padding: 20px;
            max-height: 400px;
            overflow-y: auto;
        }
        .code-block {
            background: var(--bg);
            border-radius: 10px;
            padding: 16px;
            font-family: 'SF Mono', Monaco, monospace;
            font-size: 10px;
            color: var(--accent);
            white-space: pre-wrap;
            word-break: break-all;
            max-height: 300px;
            overflow-y: auto;
        }
        .modal-footer {
            padding: 16px 20px;
            border-top: 1px solid var(--glass-border);
            display: flex;
            gap: 10px;
            justify-content: flex-end;
        }
        .modal-btn {
            padding: 10px 20px;
            border-radius: 10px;
            font-size: 12px;
            font-weight: 500;
            cursor: pointer;
            font-family: inherit;
        }
        .modal-btn.secondary {
            background: var(--glass);
            border: 1px solid var(--glass-border);
            color: var(--text);
        }
        .modal-btn.primary {
            background: var(--accent);
            border: none;
            color: var(--bg);
        }

        /* Scroll progress indicator */
        #scroll-progress {
            position: fixed;
            left: 0;
            top: 0;
            height: 3px;
            background: var(--accent);
            z-index: 500;
            width: 0%;
            transition: width 0.1s;
        }

        /* Toast notifications */
        #toast {
            position: fixed;
            bottom: 80px;
            left: 50%;
            transform: translateX(-50%) translateY(20px);
            background: var(--surface-solid);
            border: 1px solid var(--glass-border);
            border-radius: 10px;
            padding: 12px 20px;
            font-size: 12px;
            z-index: 400;
            opacity: 0;
            transition: all 0.3s;
            pointer-events: none;
        }
        #toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }
    </style>
    <script type="module" src="https://unpkg.com/@splinetool/runtime@1.9.96/build/runtime.js"></script>
</head>
<body>
    <div id="scroll-progress"></div>
    
    <div id="canvas-container">
        <canvas id="canvas3d"></canvas>
    </div>

    <!-- Minimal Top Bar -->
    <div id="topbar">
        <span class="topbar-logo">◆ Elevia</span>
        <div class="topbar-divider"></div>
        <input type="text" class="topbar-input" id="scene-url" placeholder="Paste Spline scene URL...">
        <button class="topbar-btn" onclick="loadScene()">Load</button>
    </div>

    <!-- Breakpoint Selector -->
    <div id="bp-selector">
        <button class="bp-btn active" id="bp-monitor" onclick="setBreakpoint('monitor')">🖥</button>
        <button class="bp-btn" id="bp-laptop" onclick="setBreakpoint('laptop')">💻</button>
        <button class="bp-btn" id="bp-tablet" onclick="setBreakpoint('tablet')">📱</button>
        <button class="bp-btn" id="bp-mobile" onclick="setBreakpoint('mobile')">📲</button>
    </div>

    <!-- Left Corner Tools -->
    <div class="corner-tools left">
        <button class="tool-btn" onclick="toggleObjectSelector()" title="Select Object">🎯</button>
        <button class="tool-btn" id="preview-btn" onclick="togglePreview()" title="Preview (Space)">▶</button>
        <button class="tool-btn" onclick="openExportModal()" title="Export">📤</button>
    </div>

    <!-- Right Corner Tools -->
    <div class="corner-tools right">
        <button class="tool-btn" onclick="toggleKeyframeList()" title="Keyframes">◆</button>
        <button class="tool-btn" onclick="addKeyframe()" title="Add Keyframe (K)">+</button>
    </div>

    <!-- Object Selector Popup -->
    <div id="object-selector">
        <div class="obj-selector-title">
            <span>Select Object</span>
            <button class="ctx-close" onclick="toggleObjectSelector()">×</button>
        </div>
        <div class="obj-list" id="obj-list">
            <div style="color: var(--text-dim); text-align: center; padding: 20px;">Load a scene first</div>
        </div>
    </div>

    <!-- Keyframe List Popup -->
    <div id="keyframe-list">
        <div class="kf-list-title">Keyframes</div>
        <div id="kf-items"></div>
        <button class="add-kf-btn" onclick="addKeyframe()">+ Add Keyframe</button>
    </div>

    <!-- Context Menu (Properties) -->
    <div id="context-menu">
        <div class="ctx-header">
            <span class="ctx-title" id="ctx-kf-title">Keyframe 1</span>
            <button class="ctx-close" onclick="closeContextMenu()">×</button>
        </div>
        
        <div class="ctx-section">
            <div class="ctx-section-title">Scroll Trigger</div>
            <div class="ctx-slider-row">
                <span class="ctx-slider-label">Position</span>
                <input type="range" class="ctx-slider" id="scroll-slider" min="0" max="100" value="0" oninput="updateScroll(this.value)">
                <span class="ctx-slider-value" id="scroll-value">0%</span>
            </div>
        </div>

        <div class="ctx-section">
            <div class="ctx-section-title">Position</div>
            <div class="ctx-row">
                <div class="ctx-input-group">
                    <span class="ctx-input-label x">X</span>
                    <input type="number" class="ctx-input" id="pos-x" oninput="updateTransform()">
                </div>
                <div class="ctx-input-group">
                    <span class="ctx-input-label y">Y</span>
                    <input type="number" class="ctx-input" id="pos-y" oninput="updateTransform()">
                </div>
                <div class="ctx-input-group">
                    <span class="ctx-input-label z">Z</span>
                    <input type="number" class="ctx-input" id="pos-z" oninput="updateTransform()">
                </div>
            </div>
        </div>

        <div class="ctx-section">
            <div class="ctx-section-title">Rotation</div>
            <div class="ctx-row">
                <div class="ctx-input-group">
                    <span class="ctx-input-label x">X</span>
                    <input type="number" class="ctx-input" id="rot-x" oninput="updateTransform()">
                </div>
                <div class="ctx-input-group">
                    <span class="ctx-input-label y">Y</span>
                    <input type="number" class="ctx-input" id="rot-y" oninput="updateTransform()">
                </div>
                <div class="ctx-input-group">
                    <span class="ctx-input-label z">Z</span>
                    <input type="number" class="ctx-input" id="rot-z" oninput="updateTransform()">
                </div>
            </div>
        </div>

        <div class="ctx-section">
            <div class="ctx-section-title">Opacity</div>
            <div class="ctx-slider-row">
                <span class="ctx-slider-label">Alpha</span>
                <input type="range" class="ctx-slider" id="opacity-slider" min="0" max="100" value="100" oninput="updateOpacity(this.value)">
                <span class="ctx-slider-value" id="opacity-value">100%</span>
            </div>
        </div>

        <div class="ctx-section">
            <div class="ctx-section-title">Easing</div>
            <select class="ctx-select" id="easing-select" onchange="updateEasing(this.value)">
                <option value="linear">Linear</option>
                <option value="easeInQuad">Ease In</option>
                <option value="easeOutQuad">Ease Out</option>
                <option value="easeInOutQuad">Ease In Out</option>
            </select>
        </div>

        <div class="ctx-btn-row">
            <button class="ctx-btn danger" onclick="deleteKeyframe()">Delete</button>
            <button class="ctx-btn primary" onclick="closeContextMenu()">Done</button>
        </div>
    </div>

    <!-- Status Pill -->
    <div id="status-pill">
        <div class="status-item">
            <div class="status-dot" id="preview-dot"></div>
            <span id="preview-label">Preview Off</span>
        </div>
        <div class="status-item">
            <span style="color: var(--text-dim);">Scroll</span>
            <span class="status-value" id="scroll-display">0.0%</span>
        </div>
        <div class="status-key">Space</div>
        <div class="status-key">K</div>
    </div>

    <!-- Export Modal -->
    <div id="export-modal" class="modal-overlay" onclick="if(event.target===this)closeExportModal()">
        <div class="modal">
            <div class="modal-header">
                <span class="modal-title">Export Configuration</span>
                <button class="modal-close" onclick="closeExportModal()">×</button>
            </div>
            <div class="modal-body">
                <div class="code-block" id="export-code"></div>
            </div>
            <div class="modal-footer">
                <button class="modal-btn secondary" onclick="closeExportModal()">Cancel</button>
                <button class="modal-btn primary" onclick="copyExport()">Copy Code</button>
            </div>
        </div>
    </div>

    <!-- Toast -->
    <div id="toast"></div>

    <script type="module">
        import { Application } from 'https://unpkg.com/@splinetool/runtime@1.9.96/build/runtime.js';

        const state = {
            app: null,
            objects: [],
            activeObjId: null,
            activeKeyframeId: null,
            currentScroll: 0,
            previewMode: false,
            activeBreakpoint: 'monitor',
            breakpointWidths: { monitor: 1440, laptop: 1024, tablet: 768, mobile: 0 },
            sceneObjects: []
        };

        window.editorState = state;

        function showToast(msg) {
            const toast = document.getElementById('toast');
            toast.textContent = msg;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 2000);
        }

        window.togglePreview = function() {
            state.previewMode = !state.previewMode;
            const btn = document.getElementById('preview-btn');
            const dot = document.getElementById('preview-dot');
            const label = document.getElementById('preview-label');
            if (state.previewMode) {
                btn.classList.add('active');
                dot.classList.add('active');
                label.innerText = "Preview On";
                requestAnimationFrame(renderFrame);
                showToast("Preview enabled");
            } else {
                btn.classList.remove('active');
                dot.classList.remove('active');
                label.innerText = "Preview Off";
                showToast("Preview disabled");
            }
        }

        window.toggleObjectSelector = function() {
            document.getElementById('object-selector').classList.toggle('show');
            document.getElementById('keyframe-list').classList.remove('show');
            closeContextMenu();
        }

        window.toggleKeyframeList = function() {
            document.getElementById('keyframe-list').classList.toggle('show');
            document.getElementById('object-selector').classList.remove('show');
        }

        window.closeContextMenu = function() {
            document.getElementById('context-menu').classList.remove('show');
        }

        window.addEventListener('load', () => {
            const savedUrl = localStorage.getItem('spline_tool_url');
            if (savedUrl) {
                document.getElementById('scene-url').value = savedUrl;
                loadScene();
            }
        });

        window.loadScene = async function() {
            const url = document.getElementById('scene-url').value;
            if (!url) return;
            localStorage.setItem('spline_tool_url', url);
            const canvas = document.getElementById('canvas3d');
            if (!state.app) state.app = new Application(canvas);
            try {
                await state.app.load(url);
                
                state.sceneObjects = [];
                const skipTypes = ['DirectionalLight', 'AmbientLight', 'PointLight', 'SpotLight', 'PerspectiveCamera', 'OrthographicCamera'];
                const skipKeywords = ['light', 'camera', 'invisible', '__', 'buildin'];
                const skipExactNames = ['scene', 'scene 1', 'group', 'default'];
                
                function isValidUserObject(node) {
                    if (!node || !node.name) return false;
                    const nameLower = node.name.toLowerCase().trim();
                    if (skipTypes.includes(node.type)) return false;
                    if (skipKeywords.some(kw => nameLower.includes(kw))) return false;
                    if (skipExactNames.includes(nameLower)) return false;
                    if (/^group(\s*\d*)?$/i.test(node.name)) return false;
                    if (node.type === 'Scene') return false;
                    return true;
                }
                
                function collectObjects(node, depth = 0) {
                    if (!node) return;
                    if (depth === 1 && isValidUserObject(node)) {
                        if (!state.sceneObjects.some(o => o.name === node.name)) {
                            state.sceneObjects.push({ name: node.name, type: node.type || 'Object', uuid: node.uuid });
                        }
                    }
                    if (node.children && depth < 1) {
                        node.children.forEach(child => collectObjects(child, depth + 1));
                    }
                }
                
                if (state.app._scene) {
                    state.app._scene.children.forEach(child => collectObjects(child, 0));
                }
                
                renderObjectList();
                showToast("Scene loaded successfully");
            } catch (e) {
                console.error(e);
                showToast("Failed to load scene");
            }
        }

        function renderObjectList() {
            const container = document.getElementById('obj-list');
            if (state.sceneObjects.length === 0) {
                container.innerHTML = '<div style="color: var(--text-dim); text-align: center; padding: 20px;">No objects found</div>';
                return;
            }
            
            container.innerHTML = state.sceneObjects.map(obj => {
                const objData = state.objects.find(o => o.name === obj.name);
                const kfCount = objData ? Object.values(objData.keyframes).flat().length : 0;
                const isSelected = objData?.id === state.activeObjId;
                return `<div class="obj-item ${isSelected ? 'selected' : ''}" onclick="selectObject('${obj.name}')">
                    <div class="obj-icon">🎲</div>
                    <div class="obj-info">
                        <div class="obj-name">${obj.name}</div>
                        <div class="obj-type">${obj.type}</div>
                    </div>
                    ${kfCount > 0 ? `<span class="obj-kf-count">${kfCount} kf</span>` : ''}
                </div>`;
            }).join('');
        }

        function renderKeyframeList() {
            const container = document.getElementById('kf-items');
            const obj = state.objects.find(o => o.id === state.activeObjId);
            if (!obj) {
                container.innerHTML = '<div style="color: var(--text-dim); text-align: center; padding: 10px; font-size: 11px;">Select an object first</div>';
                return;
            }
            
            const kfs = obj.keyframes[state.activeBreakpoint] || [];
            if (kfs.length === 0) {
                container.innerHTML = '<div style="color: var(--text-dim); text-align: center; padding: 10px; font-size: 11px;">No keyframes yet</div>';
                return;
            }
            
            container.innerHTML = kfs.map(kf => `
                <div class="kf-item ${kf.id === state.activeKeyframeId ? 'selected' : ''}" onclick="selectKeyframe('${kf.id}')">
                    <span class="kf-name">${kf.name}</span>
                    <span class="kf-scroll">${kf.scroll}%</span>
                </div>
            `).join('');
        }

        window.selectObject = function(name) {
            const existing = state.objects.find(o => o.name === name);
            if (existing) {
                state.activeObjId = existing.id;
            } else {
                const id = 'obj_' + Date.now();
                const obj = { id, name, keyframes: { monitor: [], laptop: [], tablet: [], mobile: [] } };
                state.objects.push(obj);
                state.activeObjId = id;
            }
            state.activeKeyframeId = null;
            document.getElementById('object-selector').classList.remove('show');
            document.getElementById('keyframe-list').classList.add('show');
            renderObjectList();
            renderKeyframeList();
            showToast(`Selected: ${name}`);
        }

        window.addEventListener('scroll', () => {
            const docH = document.body.scrollHeight - window.innerHeight;
            state.currentScroll = docH > 0 ? (window.scrollY / docH) * 100 : 0;
            document.getElementById('scroll-display').innerText = state.currentScroll.toFixed(1) + '%';
            document.getElementById('scroll-progress').style.width = state.currentScroll + '%';
            if (state.previewMode) requestAnimationFrame(renderFrame);
        });

        window.setBreakpoint = function(bp) {
            state.activeBreakpoint = bp;
            document.querySelectorAll('.bp-btn').forEach(t => t.classList.remove('active'));
            document.getElementById('bp-' + bp).classList.add('active');
            renderKeyframeList();
        }

        function getKeyframes(obj) {
            if (!obj) return [];
            return obj.keyframes[state.activeBreakpoint] || [];
        }

        window.addKeyframe = function() {
            const obj = state.objects.find(o => o.id === state.activeObjId);
            if (!obj) {
                showToast("Select an object first");
                return;
            }
            const kfs = getKeyframes(obj);

            let pos = { x: 0, y: 0, z: 0 }, rot = { x: 0, y: 0, z: 0 };
            if (state.app) {
                let splineApiObj = state.app.findObjectByName(obj.name);
                if (splineApiObj) {
                    pos = { x: Math.round(splineApiObj.position.x), y: Math.round(splineApiObj.position.y), z: Math.round(splineApiObj.position.z) };
                    rot = { x: Math.round(splineApiObj.rotation.x * 180 / Math.PI), y: Math.round(splineApiObj.rotation.y * 180 / Math.PI), z: Math.round(splineApiObj.rotation.z * 180 / Math.PI) };
                }
            }

            const kf = {
                id: 'kf_' + Date.now(),
                name: 'Keyframe ' + (kfs.length + 1),
                scroll: Math.round(state.currentScroll),
                pos, rot,
                op: 100,
                easing: 'linear'
            };
            kfs.push(kf);
            selectKeyframe(kf.id);
            showToast("Keyframe added");
        }

        window.selectKeyframe = function(id) {
            state.activeKeyframeId = id;
            const obj = state.objects.find(o => o.id === state.activeObjId);
            const kf = getKeyframes(obj).find(k => k.id === id);
            if (!kf) return;

            // Show context menu
            const ctx = document.getElementById('context-menu');
            ctx.classList.add('show');
            ctx.style.left = '50%';
            ctx.style.top = '50%';
            ctx.style.transform = 'translate(-50%, -50%)';
            
            // Fill values
            document.getElementById('ctx-kf-title').textContent = kf.name;
            document.getElementById('scroll-slider').value = kf.scroll;
            document.getElementById('scroll-value').textContent = kf.scroll + '%';
            document.getElementById('pos-x').value = kf.pos.x;
            document.getElementById('pos-y').value = kf.pos.y;
            document.getElementById('pos-z').value = kf.pos.z;
            document.getElementById('rot-x').value = kf.rot.x;
            document.getElementById('rot-y').value = kf.rot.y;
            document.getElementById('rot-z').value = kf.rot.z;
            document.getElementById('opacity-slider').value = kf.op ?? 100;
            document.getElementById('opacity-value').textContent = (kf.op ?? 100) + '%';
            document.getElementById('easing-select').value = kf.easing || 'linear';
            
            renderKeyframeList();
        }

        window.updateScroll = function(val) {
            const obj = state.objects.find(o => o.id === state.activeObjId);
            const kf = getKeyframes(obj).find(k => k.id === state.activeKeyframeId);
            if (kf) {
                kf.scroll = parseInt(val);
                document.getElementById('scroll-value').textContent = val + '%';
                renderKeyframeList();
            }
        }

        window.updateTransform = function() {
            const obj = state.objects.find(o => o.id === state.activeObjId);
            const kf = getKeyframes(obj).find(k => k.id === state.activeKeyframeId);
            if (!kf) return;

            kf.pos.x = parseFloat(document.getElementById('pos-x').value) || 0;
            kf.pos.y = parseFloat(document.getElementById('pos-y').value) || 0;
            kf.pos.z = parseFloat(document.getElementById('pos-z').value) || 0;
            kf.rot.x = parseFloat(document.getElementById('rot-x').value) || 0;
            kf.rot.y = parseFloat(document.getElementById('rot-y').value) || 0;
            kf.rot.z = parseFloat(document.getElementById('rot-z').value) || 0;
        }

        window.updateOpacity = function(val) {
            const obj = state.objects.find(o => o.id === state.activeObjId);
            const kf = getKeyframes(obj).find(k => k.id === state.activeKeyframeId);
            if (kf) {
                kf.op = parseInt(val);
                document.getElementById('opacity-value').textContent = val + '%';
            }
        }

        window.updateEasing = function(val) {
            const obj = state.objects.find(o => o.id === state.activeObjId);
            const kf = getKeyframes(obj).find(k => k.id === state.activeKeyframeId);
            if (kf) kf.easing = val;
        }

        window.deleteKeyframe = function() {
            const obj = state.objects.find(o => o.id === state.activeObjId);
            if (!obj) return;
            const kfs = getKeyframes(obj);
            const idx = kfs.findIndex(k => k.id === state.activeKeyframeId);
            if (idx >= 0) {
                kfs.splice(idx, 1);
                state.activeKeyframeId = null;
                closeContextMenu();
                renderKeyframeList();
                showToast("Keyframe deleted");
            }
        }

        const easingFunctions = {
            linear: t => t,
            easeInQuad: t => t * t,
            easeOutQuad: t => t * (2 - t),
            easeInOutQuad: t => t < 0.5 ? 2 * t * t : -1 + (4 - 2 * t) * t
        };

        function renderFrame() {
            if (!state.app) { if (state.previewMode) requestAnimationFrame(renderFrame); return; }
            const scroll = state.currentScroll;
            const w = window.innerWidth;
            let targetBp = 'mobile';
            if (w >= state.breakpointWidths.monitor) targetBp = 'monitor';
            else if (w >= state.breakpointWidths.laptop) targetBp = 'laptop';
            else if (w >= state.breakpointWidths.tablet) targetBp = 'tablet';

            state.objects.forEach(objDef => {
                let splineApiObj = state.app.findObjectByName(objDef.name);
                if (!splineApiObj) return;

                const kfs = objDef.keyframes[targetBp] || [];
                if (kfs.length === 0) return;

                const sorted = [...kfs].sort((a,b) => a.scroll - b.scroll);
                let prev = sorted[0], next = sorted[sorted.length - 1];
                for (let i = 0; i < sorted.length; i++) {
                    if (sorted[i].scroll <= scroll) prev = sorted[i];
                    if (sorted[i].scroll >= scroll) { next = sorted[i]; break; }
                }

                let t = 0;
                if (prev !== next && next.scroll !== prev.scroll) t = (scroll - prev.scroll) / (next.scroll - prev.scroll);
                else if (scroll >= next.scroll) t = 1;

                const easeFn = easingFunctions[next.easing] || easingFunctions.linear;
                t = easeFn(Math.max(0, Math.min(1, t)));
                const lerp = (a, b) => a + (b - a) * t;

                splineApiObj.position.x = lerp(prev.pos.x, next.pos.x);
                splineApiObj.position.y = lerp(prev.pos.y, next.pos.y);
                splineApiObj.position.z = lerp(prev.pos.z, next.pos.z);
                splineApiObj.rotation.x = lerp(prev.rot.x, next.rot.x) * Math.PI / 180;
                splineApiObj.rotation.y = lerp(prev.rot.y, next.rot.y) * Math.PI / 180;
                splineApiObj.rotation.z = lerp(prev.rot.z, next.rot.z) * Math.PI / 180;
            });
            
            if (state.previewMode) requestAnimationFrame(renderFrame);
        }

        function getExportData() {
            return { breakpointWidths: state.breakpointWidths, objects: state.objects.map(o => ({ name: o.name, keyframes: o.keyframes })) };
        }

        window.openExportModal = function() {
            document.getElementById('export-modal').classList.add('show');
            document.getElementById('export-code').textContent = JSON.stringify(getExportData(), null, 2);
        }
        window.closeExportModal = function() { document.getElementById('export-modal').classList.remove('show'); }
        window.copyExport = function() {
            navigator.clipboard.writeText(JSON.stringify(getExportData(), null, 2));
            showToast("Copied to clipboard");
            closeExportModal();
        }

        // Keyboard shortcuts
        document.addEventListener('keydown', e => {
            if (e.target.tagName === 'INPUT' || e.target.tagName === 'SELECT') return;
            if (e.key === ' ') { e.preventDefault(); togglePreview(); }
            if (e.key === 'k' || e.key === 'K') addKeyframe();
            if (e.key === 'Escape') {
                closeContextMenu();
                document.getElementById('object-selector').classList.remove('show');
                document.getElementById('keyframe-list').classList.remove('show');
            }
        });
    </script>
</body>
</html>
