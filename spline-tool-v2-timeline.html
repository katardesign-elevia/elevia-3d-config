<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elevia 3D - Timeline Style</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #1a1a1a;
            --surface: #242424;
            --surface-light: #2e2e2e;
            --border: #3a3a3a;
            --text: #e5e5e5;
            --text-secondary: #888;
            --text-tertiary: #555;
            --accent: #5b9fff;
            --accent-dim: rgba(91, 159, 255, 0.15);
            --orange: #ff9f43;
            --green: #26de81;
            --red: #fc5c65;
            --purple: #a55eea;
            --timeline-bg: #1e1e1e;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text);
            height: 500vh;
            font-size: 12px;
            overflow-x: hidden;
        }

        /* Canvas - Takes most of the screen */
        #canvas-container {
            position: fixed;
            top: 48px;
            left: 0;
            right: 0;
            bottom: 200px;
            background: #0f0f0f;
            z-index: 1;
        }
        canvas {
            display: block;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }

        /* Top Bar */
        #topbar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 48px;
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            z-index: 100;
            display: flex;
            align-items: center;
            padding: 0 16px;
            gap: 16px;
        }
        .topbar-logo {
            font-weight: 600;
            font-size: 13px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .topbar-logo span {
            color: var(--accent);
        }
        .topbar-divider {
            width: 1px;
            height: 24px;
            background: var(--border);
        }
        .topbar-group {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .topbar-input {
            width: 280px;
            padding: 8px 12px;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 6px;
            color: var(--text);
            font-size: 11px;
        }
        .topbar-input:focus {
            outline: none;
            border-color: var(--accent);
        }
        .topbar-btn {
            padding: 8px 14px;
            background: var(--accent);
            border: none;
            border-radius: 6px;
            color: white;
            font-size: 11px;
            font-weight: 500;
            cursor: pointer;
        }
        .topbar-btn:hover {
            filter: brightness(1.1);
        }
        .topbar-btn.secondary {
            background: var(--surface-light);
            color: var(--text);
        }
        .topbar-spacer {
            flex: 1;
        }
        .status-group {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 6px 12px;
            background: var(--bg);
            border-radius: 6px;
        }
        .status-item {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 11px;
        }
        .status-dot {
            width: 8px;
            height: 8px;
            background: var(--text-tertiary);
            border-radius: 50%;
        }
        .status-dot.active {
            background: var(--green);
            box-shadow: 0 0 8px rgba(38, 222, 129, 0.5);
        }
        .status-value {
            color: var(--accent);
            font-weight: 600;
            font-variant-numeric: tabular-nums;
        }

        /* Timeline Panel - Bottom */
        #timeline-panel {
            position: fixed;
            left: 0;
            right: 0;
            bottom: 0;
            height: 200px;
            background: var(--timeline-bg);
            border-top: 1px solid var(--border);
            z-index: 100;
            display: flex;
            flex-direction: column;
        }

        /* Timeline Header */
        .timeline-header {
            display: flex;
            align-items: center;
            padding: 8px 16px;
            border-bottom: 1px solid var(--border);
            gap: 12px;
        }
        .timeline-title {
            font-size: 11px;
            font-weight: 600;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .timeline-controls {
            display: flex;
            gap: 4px;
        }
        .timeline-ctrl-btn {
            width: 28px;
            height: 28px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 4px;
            color: var(--text-secondary);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
        }
        .timeline-ctrl-btn:hover {
            background: var(--surface-light);
            color: var(--text);
        }
        .timeline-ctrl-btn.active {
            background: var(--accent);
            border-color: var(--accent);
            color: white;
        }
        .bp-selector {
            display: flex;
            background: var(--surface);
            border-radius: 4px;
            padding: 2px;
            margin-left: auto;
        }
        .bp-btn {
            padding: 6px 12px;
            background: transparent;
            border: none;
            border-radius: 3px;
            color: var(--text-secondary);
            font-size: 10px;
            font-weight: 500;
            cursor: pointer;
        }
        .bp-btn:hover {
            color: var(--text);
        }
        .bp-btn.active {
            background: var(--accent);
            color: white;
        }

        /* Timeline Body */
        .timeline-body {
            flex: 1;
            display: flex;
            overflow: hidden;
        }

        /* Object List (Left side of timeline) */
        .timeline-objects {
            width: 200px;
            border-right: 1px solid var(--border);
            overflow-y: auto;
        }
        .timeline-object {
            display: flex;
            align-items: center;
            padding: 10px 12px;
            gap: 8px;
            cursor: pointer;
            border-bottom: 1px solid var(--border);
            transition: background 0.1s;
        }
        .timeline-object:hover {
            background: var(--surface);
        }
        .timeline-object.selected {
            background: var(--accent-dim);
            border-left: 3px solid var(--accent);
        }
        .obj-color {
            width: 12px;
            height: 12px;
            border-radius: 3px;
            background: var(--purple);
        }
        .obj-name {
            flex: 1;
            font-size: 11px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .obj-badge {
            font-size: 9px;
            padding: 2px 6px;
            background: var(--green);
            border-radius: 3px;
            color: white;
        }
        .add-object-btn {
            padding: 10px 12px;
            color: var(--text-tertiary);
            font-size: 11px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .add-object-btn:hover {
            color: var(--accent);
        }

        /* Timeline Track Area */
        .timeline-tracks {
            flex: 1;
            position: relative;
            overflow-x: auto;
            overflow-y: auto;
        }

        /* Timeline Ruler */
        .timeline-ruler {
            height: 24px;
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            position: sticky;
            top: 0;
            z-index: 10;
            display: flex;
        }
        .ruler-mark {
            flex: 1;
            text-align: center;
            font-size: 9px;
            color: var(--text-tertiary);
            border-right: 1px solid var(--border);
            padding-top: 6px;
        }
        .ruler-mark:nth-child(5n) {
            color: var(--text-secondary);
        }

        /* Keyframe Track */
        .keyframe-track {
            height: 44px;
            border-bottom: 1px solid var(--border);
            position: relative;
            min-width: 1000px;
        }
        .keyframe-track.selected {
            background: var(--accent-dim);
        }

        /* Keyframe Diamond */
        .keyframe-diamond {
            position: absolute;
            top: 50%;
            transform: translate(-50%, -50%) rotate(45deg);
            width: 14px;
            height: 14px;
            background: var(--orange);
            border: 2px solid var(--bg);
            cursor: pointer;
            transition: all 0.15s;
            z-index: 5;
        }
        .keyframe-diamond:hover {
            transform: translate(-50%, -50%) rotate(45deg) scale(1.2);
        }
        .keyframe-diamond.selected {
            background: var(--accent);
            box-shadow: 0 0 0 3px var(--accent-dim);
        }

        /* Playhead */
        .playhead {
            position: absolute;
            top: 0;
            bottom: 0;
            width: 2px;
            background: var(--red);
            z-index: 20;
            pointer-events: none;
        }
        .playhead::before {
            content: '';
            position: absolute;
            top: 0;
            left: -5px;
            width: 12px;
            height: 12px;
            background: var(--red);
            border-radius: 2px 2px 50% 50%;
        }

        /* Properties Panel (Right side) */
        #properties-panel {
            position: fixed;
            top: 48px;
            right: 0;
            width: 260px;
            bottom: 200px;
            background: var(--surface);
            border-left: 1px solid var(--border);
            z-index: 50;
            display: flex;
            flex-direction: column;
            transform: translateX(100%);
            transition: transform 0.2s;
        }
        #properties-panel.open {
            transform: translateX(0);
        }
        .props-header {
            padding: 12px 16px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .props-title {
            font-size: 12px;
            font-weight: 600;
        }
        .props-close {
            width: 24px;
            height: 24px;
            background: transparent;
            border: none;
            border-radius: 4px;
            color: var(--text-secondary);
            cursor: pointer;
        }
        .props-close:hover {
            background: var(--surface-light);
        }
        .props-body {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
        }
        .props-section {
            margin-bottom: 20px;
        }
        .props-section-title {
            font-size: 10px;
            font-weight: 600;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 10px;
        }
        .props-row {
            display: flex;
            align-items: center;
            margin-bottom: 8px;
            gap: 8px;
        }
        .props-label {
            width: 24px;
            font-size: 11px;
            font-weight: 500;
        }
        .props-label.x { color: var(--red); }
        .props-label.y { color: var(--green); }
        .props-label.z { color: var(--accent); }
        .props-input {
            flex: 1;
            padding: 8px 10px;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 4px;
            color: var(--text);
            font-size: 11px;
            font-variant-numeric: tabular-nums;
        }
        .props-input:focus {
            outline: none;
            border-color: var(--accent);
        }
        .props-slider {
            flex: 1;
            height: 4px;
            -webkit-appearance: none;
            background: var(--border);
            border-radius: 2px;
        }
        .props-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 14px;
            height: 14px;
            background: white;
            border-radius: 50%;
            cursor: pointer;
        }

        /* Floating Action Button */
        .fab {
            position: fixed;
            bottom: 220px;
            right: 20px;
            width: 48px;
            height: 48px;
            background: var(--accent);
            border: none;
            border-radius: 50%;
            color: white;
            font-size: 24px;
            cursor: pointer;
            box-shadow: 0 4px 12px rgba(91, 159, 255, 0.4);
            z-index: 60;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .fab:hover {
            transform: scale(1.05);
        }

        /* Modal */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.7);
            z-index: 200;
            display: none;
            align-items: center;
            justify-content: center;
        }
        .modal-overlay.show { display: flex; }
        .modal {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 8px;
            width: 480px;
            max-width: 90vw;
            max-height: 80vh;
            overflow: hidden;
        }
        .modal-header {
            padding: 14px 18px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .modal-title { font-size: 14px; font-weight: 600; }
        .modal-close {
            width: 28px;
            height: 28px;
            background: transparent;
            border: none;
            border-radius: 4px;
            color: var(--text-secondary);
            cursor: pointer;
            font-size: 18px;
        }
        .modal-tabs {
            display: flex;
            border-bottom: 1px solid var(--border);
        }
        .modal-tab {
            flex: 1;
            padding: 12px;
            background: transparent;
            border: none;
            color: var(--text-secondary);
            font-size: 12px;
            cursor: pointer;
            border-bottom: 2px solid transparent;
        }
        .modal-tab.active {
            color: var(--accent);
            border-bottom-color: var(--accent);
        }
        .modal-body {
            padding: 18px;
            max-height: 320px;
            overflow-y: auto;
        }
        .code-block {
            background: var(--bg);
            border-radius: 6px;
            padding: 14px;
            font-family: 'SF Mono', Monaco, monospace;
            font-size: 10px;
            color: var(--green);
            white-space: pre-wrap;
            word-break: break-all;
        }
        .modal-footer {
            padding: 14px 18px;
            border-top: 1px solid var(--border);
            display: flex;
            gap: 8px;
            justify-content: flex-end;
        }
        .modal-btn {
            padding: 8px 16px;
            border-radius: 6px;
            font-size: 12px;
            font-weight: 500;
            cursor: pointer;
        }
        .modal-btn.secondary {
            background: var(--surface-light);
            border: 1px solid var(--border);
            color: var(--text);
        }
        .modal-btn.primary {
            background: var(--accent);
            border: none;
            color: white;
        }

        /* Popups */
        .popup {
            position: fixed;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 6px;
            z-index: 150;
            display: none;
            box-shadow: 0 4px 16px rgba(0,0,0,0.3);
        }
        .popup.show { display: block; }
        .popup-option {
            padding: 10px 14px;
            cursor: pointer;
            font-size: 11px;
        }
        .popup-option:hover { background: var(--surface-light); }
        .popup-option.active { background: var(--accent); color: white; }

        /* Empty state */
        .empty-state {
            padding: 20px;
            text-align: center;
            color: var(--text-tertiary);
            font-size: 11px;
        }
    </style>
    <script type="module" src="https://unpkg.com/@splinetool/runtime@1.9.96/build/runtime.js"></script>
</head>
<body>
    <div id="canvas-container">
        <canvas id="canvas3d"></canvas>
    </div>

    <!-- Top Bar -->
    <div id="topbar">
        <div class="topbar-logo">
            <span>◆</span> Elevia 3D
        </div>
        <div class="topbar-divider"></div>
        <div class="topbar-group">
            <input type="text" class="topbar-input" id="scene-url" placeholder="Paste Spline URL...">
            <button class="topbar-btn" onclick="loadScene()">Load</button>
        </div>
        <div class="topbar-spacer"></div>
        <div class="status-group">
            <div class="status-item">
                <div class="status-dot" id="preview-dot"></div>
                <span id="preview-label">Off</span>
            </div>
            <div class="status-item">
                <span style="color: var(--text-secondary);">Scroll:</span>
                <span class="status-value" id="scroll-display">0.0%</span>
            </div>
        </div>
        <div class="topbar-divider"></div>
        <button class="topbar-btn secondary" onclick="openExportModal()">Export</button>
    </div>

    <!-- Properties Panel -->
    <div id="properties-panel">
        <div class="props-header">
            <span class="props-title">Keyframe Properties</span>
            <button class="props-close" onclick="closePropsPanel()">×</button>
        </div>
        <div class="props-body">
            <div class="props-section">
                <div class="props-section-title">Trigger Point</div>
                <div class="props-row">
                    <span class="props-label">%</span>
                    <input type="range" class="props-slider" id="trigger-slider" min="0" max="100" value="0" data-type="scroll" oninput="updateTransform(this)">
                    <input type="number" class="props-input" style="width: 60px;" data-type="scroll" oninput="updateTransform(this)">
                </div>
            </div>
            <div class="props-section">
                <div class="props-section-title">Position</div>
                <div class="props-row">
                    <span class="props-label x">X</span>
                    <input type="number" class="props-input" data-type="pos" data-axis="x" oninput="updateTransform(this)">
                </div>
                <div class="props-row">
                    <span class="props-label y">Y</span>
                    <input type="number" class="props-input" data-type="pos" data-axis="y" oninput="updateTransform(this)">
                </div>
                <div class="props-row">
                    <span class="props-label z">Z</span>
                    <input type="number" class="props-input" data-type="pos" data-axis="z" oninput="updateTransform(this)">
                </div>
            </div>
            <div class="props-section">
                <div class="props-section-title">Rotation</div>
                <div class="props-row">
                    <span class="props-label x">X</span>
                    <input type="number" class="props-input" data-type="rot" data-axis="x" oninput="updateTransform(this)">
                </div>
                <div class="props-row">
                    <span class="props-label y">Y</span>
                    <input type="number" class="props-input" data-type="rot" data-axis="y" oninput="updateTransform(this)">
                </div>
                <div class="props-row">
                    <span class="props-label z">Z</span>
                    <input type="number" class="props-input" data-type="rot" data-axis="z" oninput="updateTransform(this)">
                </div>
            </div>
            <div class="props-section">
                <div class="props-section-title">Opacity & Easing</div>
                <div class="props-row">
                    <span class="props-label">Op</span>
                    <input type="range" class="props-slider" id="opacity-slider" min="0" max="100" value="100" oninput="updateOpacity(this.value)">
                    <input type="number" class="props-input" style="width: 60px;" id="opacity-input" value="100" oninput="updateOpacity(this.value)">
                </div>
                <div class="props-row">
                    <span class="props-label">Ease</span>
                    <select class="props-input" id="easing-select" onchange="updateEasing(this.value)">
                        <option value="linear">Linear</option>
                        <option value="easeInQuad">Ease In</option>
                        <option value="easeOutQuad">Ease Out</option>
                        <option value="easeInOutQuad">Ease In Out</option>
                    </select>
                </div>
            </div>
        </div>
    </div>

    <!-- Timeline Panel -->
    <div id="timeline-panel">
        <div class="timeline-header">
            <span class="timeline-title">Timeline</span>
            <div class="timeline-controls">
                <button class="timeline-ctrl-btn" id="preview-btn" onclick="togglePreview()" title="Preview">▶</button>
                <button class="timeline-ctrl-btn" onclick="addKeyframe()" title="Add Keyframe">◆</button>
            </div>
            <div class="bp-selector">
                <button class="bp-btn active" id="bp-monitor" onclick="setBreakpoint('monitor')">Monitor</button>
                <button class="bp-btn" id="bp-laptop" onclick="setBreakpoint('laptop')">Laptop</button>
                <button class="bp-btn" id="bp-tablet" onclick="setBreakpoint('tablet')">Tablet</button>
                <button class="bp-btn" id="bp-mobile" onclick="setBreakpoint('mobile')">Mobile</button>
            </div>
        </div>
        <div class="timeline-body">
            <div class="timeline-objects" id="timeline-objects">
                <div class="empty-state">Load a scene to see objects</div>
            </div>
            <div class="timeline-tracks" id="timeline-tracks">
                <div class="timeline-ruler">
                    <div class="ruler-mark">0%</div>
                    <div class="ruler-mark">10%</div>
                    <div class="ruler-mark">20%</div>
                    <div class="ruler-mark">30%</div>
                    <div class="ruler-mark">40%</div>
                    <div class="ruler-mark">50%</div>
                    <div class="ruler-mark">60%</div>
                    <div class="ruler-mark">70%</div>
                    <div class="ruler-mark">80%</div>
                    <div class="ruler-mark">90%</div>
                    <div class="ruler-mark">100%</div>
                </div>
                <div id="keyframe-tracks"></div>
                <div class="playhead" id="playhead" style="left: 0%;"></div>
            </div>
        </div>
    </div>

    <!-- FAB for adding keyframes -->
    <button class="fab" onclick="addKeyframe()" title="Add Keyframe">+</button>

    <!-- Export Modal -->
    <div id="export-modal" class="modal-overlay" onclick="if(event.target===this)closeExportModal()">
        <div class="modal">
            <div class="modal-header">
                <span class="modal-title">Export Configuration</span>
                <button class="modal-close" onclick="closeExportModal()">×</button>
            </div>
            <div class="modal-tabs">
                <button class="modal-tab active" onclick="setExportTab('json')">JSON</button>
                <button class="modal-tab" onclick="setExportTab('shopify')">Shopify</button>
            </div>
            <div class="modal-body">
                <div id="export-json-content">
                    <div class="code-block" id="export-json-code"></div>
                </div>
                <div id="export-shopify-content" style="display:none;">
                    <div class="code-block" id="export-shopify-code"></div>
                </div>
            </div>
            <div class="modal-footer">
                <button class="modal-btn secondary" onclick="closeExportModal()">Cancel</button>
                <button class="modal-btn primary" onclick="copyExportCode()">Copy</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { Application } from 'https://unpkg.com/@splinetool/runtime@1.9.96/build/runtime.js';

        const state = {
            app: null,
            objects: [],
            activeObjId: null,
            activeKeyframeId: null,
            objectCache: new Map(),
            currentScroll: 0,
            previewMode: false,
            activeBreakpoint: 'monitor',
            breakpointWidths: { monitor: 1440, laptop: 1024, tablet: 768, mobile: 0 },
            zoomLevel: 1.0,
            sceneObjects: []
        };

        window.editorState = state;

        window.togglePreview = function() {
            state.previewMode = !state.previewMode;
            const btn = document.getElementById('preview-btn');
            const dot = document.getElementById('preview-dot');
            const label = document.getElementById('preview-label');
            if (state.previewMode) {
                btn.classList.add('active');
                dot.classList.add('active');
                label.innerText = "On";
                requestAnimationFrame(renderFrame);
            } else {
                btn.classList.remove('active');
                dot.classList.remove('active');
                label.innerText = "Off";
            }
        }

        window.closePropsPanel = function() {
            document.getElementById('properties-panel').classList.remove('open');
            state.activeKeyframeId = null;
            renderTimeline();
        }

        window.addEventListener('load', () => {
            const savedUrl = localStorage.getItem('spline_tool_url');
            if (savedUrl) {
                document.getElementById('scene-url').value = savedUrl;
                loadScene();
            }
        });

        window.loadScene = async function() {
            const url = document.getElementById('scene-url').value;
            if (!url) return;
            localStorage.setItem('spline_tool_url', url);
            const canvas = document.getElementById('canvas3d');
            if (!state.app) state.app = new Application(canvas);
            try {
                await state.app.load(url);
                state.objectCache.clear();
                
                state.sceneObjects = [];
                const skipTypes = ['DirectionalLight', 'AmbientLight', 'PointLight', 'SpotLight', 'PerspectiveCamera', 'OrthographicCamera'];
                const skipKeywords = ['light', 'camera', 'invisible', '__', 'buildin'];
                const skipExactNames = ['scene', 'scene 1', 'group', 'default'];
                
                function isValidUserObject(node) {
                    if (!node || !node.name) return false;
                    const nameLower = node.name.toLowerCase().trim();
                    if (skipTypes.includes(node.type)) return false;
                    if (skipKeywords.some(kw => nameLower.includes(kw))) return false;
                    if (skipExactNames.includes(nameLower)) return false;
                    if (/^group(\s*\d*)?$/i.test(node.name)) return false;
                    if (node.type === 'Scene') return false;
                    return true;
                }
                
                function collectObjects(node, depth = 0) {
                    if (!node) return;
                    if (depth === 1 && isValidUserObject(node)) {
                        if (!state.sceneObjects.some(o => o.name === node.name)) {
                            state.sceneObjects.push({ name: node.name, type: node.type || 'Object', uuid: node.uuid });
                        }
                    }
                    if (node.children && depth < 1) {
                        node.children.forEach(child => collectObjects(child, depth + 1));
                    }
                }
                
                if (state.app._scene) {
                    state.app._scene.children.forEach(child => collectObjects(child, 0));
                }
                
                renderTimeline();
            } catch (e) {
                console.error(e);
                alert("Failed to load scene");
            }
        }

        function renderTimeline() {
            const objContainer = document.getElementById('timeline-objects');
            const trackContainer = document.getElementById('keyframe-tracks');
            
            if (state.sceneObjects.length === 0) {
                objContainer.innerHTML = '<div class="empty-state">Load a scene to see objects</div>';
                trackContainer.innerHTML = '';
                return;
            }
            
            const selectedName = state.objects[0]?.name || null;
            
            // Render object list
            objContainer.innerHTML = state.sceneObjects.map(obj => {
                const isSelected = obj.name === selectedName;
                return `<div class="timeline-object ${isSelected ? 'selected' : ''}" onclick="selectObject('${obj.name}')">
                    <div class="obj-color"></div>
                    <span class="obj-name">${obj.name}</span>
                    ${isSelected ? '<span class="obj-badge">Active</span>' : ''}
                </div>`;
            }).join('');
            
            // Render keyframe tracks
            if (selectedName) {
                const obj = state.objects[0];
                const kfs = obj?.keyframes[state.activeBreakpoint] || [];
                
                trackContainer.innerHTML = `<div class="keyframe-track selected">
                    ${kfs.map(kf => `
                        <div class="keyframe-diamond ${kf.id === state.activeKeyframeId ? 'selected' : ''}" 
                             style="left: ${kf.scroll}%;" 
                             onclick="selectKeyframe('${kf.id}')"
                             title="${kf.name}: ${kf.scroll}%"></div>
                    `).join('')}
                </div>`;
            } else {
                trackContainer.innerHTML = '<div class="empty-state" style="padding: 40px;">Select an object to see keyframes</div>';
            }
        }

        window.selectObject = function(name) {
            const existing = state.objects.find(o => o.name === name);
            if (existing) {
                state.activeObjId = existing.id;
            } else {
                const id = 'obj_' + Date.now();
                const obj = { id, name, keyframes: { monitor: [], laptop: [], tablet: [], mobile: [] } };
                state.objects = [obj];
                state.activeObjId = id;
            }
            state.activeKeyframeId = null;
            document.getElementById('properties-panel').classList.remove('open');
            renderTimeline();
        }

        window.addEventListener('scroll', () => {
            const docH = document.body.scrollHeight - window.innerHeight;
            state.currentScroll = docH > 0 ? (window.scrollY / docH) * 100 : 0;
            document.getElementById('scroll-display').innerText = state.currentScroll.toFixed(1) + '%';
            document.getElementById('playhead').style.left = state.currentScroll + '%';
            if (state.previewMode) requestAnimationFrame(renderFrame);
        });

        window.setBreakpoint = function(bp) {
            state.activeBreakpoint = bp;
            document.querySelectorAll('.bp-btn').forEach(t => t.classList.remove('active'));
            document.getElementById('bp-' + bp).classList.add('active');
            renderTimeline();
        }

        function getKeyframes(obj) {
            if (!obj) return [];
            return obj.keyframes[state.activeBreakpoint] || [];
        }

        window.addKeyframe = function() {
            const obj = state.objects.find(o => o.id === state.activeObjId);
            if (!obj) return alert("Select an object first");
            const kfs = getKeyframes(obj);

            let pos = { x: 0, y: 0, z: 0 }, rot = { x: 0, y: 0, z: 0 };
            if (state.app) {
                let splineApiObj = state.app.findObjectByName(obj.name);
                if (splineApiObj) {
                    pos = { x: Math.round(splineApiObj.position.x), y: Math.round(splineApiObj.position.y), z: Math.round(splineApiObj.position.z) };
                    rot = { x: Math.round(splineApiObj.rotation.x * 180 / Math.PI), y: Math.round(splineApiObj.rotation.y * 180 / Math.PI), z: Math.round(splineApiObj.rotation.z * 180 / Math.PI) };
                }
            }

            const kf = {
                id: 'kf_' + Date.now(),
                name: 'Keyframe ' + (kfs.length + 1),
                scroll: Math.round(state.currentScroll),
                pos, rot,
                op: 100,
                easing: 'linear'
            };
            kfs.push(kf);
            selectKeyframe(kf.id);
        }

        window.selectKeyframe = function(id) {
            state.activeKeyframeId = id;
            const obj = state.objects.find(o => o.id === state.activeObjId);
            const kf = getKeyframes(obj).find(k => k.id === id);
            if (!kf) return;

            // Open properties panel
            document.getElementById('properties-panel').classList.add('open');
            
            // Fill in values
            document.querySelectorAll('[data-type="scroll"]').forEach(el => el.value = kf.scroll);
            ['x','y','z'].forEach(axis => {
                document.querySelectorAll(`[data-type="pos"][data-axis="${axis}"]`).forEach(el => el.value = kf.pos[axis]);
                document.querySelectorAll(`[data-type="rot"][data-axis="${axis}"]`).forEach(el => el.value = kf.rot[axis]);
            });
            document.getElementById('opacity-slider').value = kf.op ?? 100;
            document.getElementById('opacity-input').value = kf.op ?? 100;
            document.getElementById('easing-select').value = kf.easing || 'linear';
            
            renderTimeline();
        }

        window.updateTransform = function(el) {
            const obj = state.objects.find(o => o.id === state.activeObjId);
            const kf = getKeyframes(obj).find(k => k.id === state.activeKeyframeId);
            if (!kf) return;

            const type = el.dataset.type, axis = el.dataset.axis, val = parseFloat(el.value) || 0;

            if (type === 'scroll') {
                kf.scroll = val;
                document.querySelectorAll('[data-type="scroll"]').forEach(e => e.value = val);
            } else if (type === 'pos') {
                kf.pos[axis] = val;
            } else if (type === 'rot') {
                kf.rot[axis] = val;
            }
            renderTimeline();
        }

        window.updateOpacity = function(val) {
            const obj = state.objects.find(o => o.id === state.activeObjId);
            const kf = getKeyframes(obj).find(k => k.id === state.activeKeyframeId);
            if (kf) {
                kf.op = parseInt(val);
                document.getElementById('opacity-slider').value = val;
                document.getElementById('opacity-input').value = val;
            }
        }

        window.updateEasing = function(val) {
            const obj = state.objects.find(o => o.id === state.activeObjId);
            const kf = getKeyframes(obj).find(k => k.id === state.activeKeyframeId);
            if (kf) kf.easing = val;
        }

        const easingFunctions = {
            linear: t => t,
            easeInQuad: t => t * t,
            easeOutQuad: t => t * (2 - t),
            easeInOutQuad: t => t < 0.5 ? 2 * t * t : -1 + (4 - 2 * t) * t
        };

        function renderFrame() {
            if (!state.app) { if (state.previewMode) requestAnimationFrame(renderFrame); return; }
            const scroll = state.currentScroll;
            const w = window.innerWidth;
            let targetBp = 'mobile';
            if (w >= state.breakpointWidths.monitor) targetBp = 'monitor';
            else if (w >= state.breakpointWidths.laptop) targetBp = 'laptop';
            else if (w >= state.breakpointWidths.tablet) targetBp = 'tablet';

            state.objects.forEach(objDef => {
                let splineApiObj = state.app.findObjectByName(objDef.name);
                if (!splineApiObj) return;

                const kfs = objDef.keyframes[targetBp] || [];
                if (kfs.length === 0) return;

                const sorted = [...kfs].sort((a,b) => a.scroll - b.scroll);
                let prev = sorted[0], next = sorted[sorted.length - 1];
                for (let i = 0; i < sorted.length; i++) {
                    if (sorted[i].scroll <= scroll) prev = sorted[i];
                    if (sorted[i].scroll >= scroll) { next = sorted[i]; break; }
                }

                let t = 0;
                if (prev !== next && next.scroll !== prev.scroll) t = (scroll - prev.scroll) / (next.scroll - prev.scroll);
                else if (scroll >= next.scroll) t = 1;

                const easeFn = easingFunctions[next.easing] || easingFunctions.linear;
                t = easeFn(Math.max(0, Math.min(1, t)));
                const lerp = (a, b) => a + (b - a) * t;

                splineApiObj.position.x = lerp(prev.pos.x, next.pos.x);
                splineApiObj.position.y = lerp(prev.pos.y, next.pos.y);
                splineApiObj.position.z = lerp(prev.pos.z, next.pos.z);
                splineApiObj.rotation.x = lerp(prev.rot.x, next.rot.x) * Math.PI / 180;
                splineApiObj.rotation.y = lerp(prev.rot.y, next.rot.y) * Math.PI / 180;
                splineApiObj.rotation.z = lerp(prev.rot.z, next.rot.z) * Math.PI / 180;
            });
            
            if (state.previewMode) requestAnimationFrame(renderFrame);
        }

        let currentExportTab = 'json';
        function getExportData() {
            return { breakpointWidths: state.breakpointWidths, objects: state.objects.map(o => ({ name: o.name, keyframes: o.keyframes })) };
        }

        window.openExportModal = function() {
            document.getElementById('export-modal').classList.add('show');
            document.getElementById('export-json-code').textContent = JSON.stringify(getExportData(), null, 2);
            document.getElementById('export-shopify-code').textContent = `const CONFIG = ${JSON.stringify(getExportData(), null, 2)};`;
        }
        window.closeExportModal = function() { document.getElementById('export-modal').classList.remove('show'); }
        window.setExportTab = function(tab) {
            currentExportTab = tab;
            document.querySelectorAll('.modal-tab').forEach(t => t.classList.remove('active'));
            event.target.classList.add('active');
            document.getElementById('export-json-content').style.display = tab === 'json' ? 'block' : 'none';
            document.getElementById('export-shopify-content').style.display = tab === 'shopify' ? 'block' : 'none';
        }
        window.copyExportCode = function() {
            const code = currentExportTab === 'json' ? JSON.stringify(getExportData(), null, 2) : `const CONFIG = ${JSON.stringify(getExportData(), null, 2)};`;
            navigator.clipboard.writeText(code);
            alert('Copied!');
        }

        // Keyboard shortcuts
        document.addEventListener('keydown', e => {
            if (e.key === ' ') { e.preventDefault(); togglePreview(); }
            if (e.key === 'k' || e.key === 'K') addKeyframe();
        });
    </script>
</body>
</html>
