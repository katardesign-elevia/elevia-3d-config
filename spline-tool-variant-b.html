<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elevia 3D Config - Mono</title>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0a0a0a;
            --surface: #111111;
            --surface-hover: #1a1a1a;
            --border: #222222;
            --text: #e0e0e0;
            --text-dim: #666666;
            --accent: #ffffff;
            --success: #4ade80;
            --error: #f87171;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'JetBrains Mono', monospace;
            background: var(--bg);
            color: var(--text);
            height: 500vh;
            font-size: 12px;
            line-height: 1.5;
        }

        /* Canvas */
        #canvas-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: 1;
        }
        canvas {
            display: block;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }

        /* Panel - Narrow sidebar */
        #editor {
            position: fixed;
            top: 0;
            right: 0;
            width: 320px;
            height: 100vh;
            background: var(--surface);
            border-left: 1px solid var(--border);
            z-index: 1000;
            display: flex;
            flex-direction: column;
            transition: transform 0.3s ease;
        }
        #editor.hidden {
            transform: translateX(100%);
        }

        /* Toggle */
        #toggle-btn {
            position: fixed;
            top: 16px;
            right: 16px;
            padding: 8px 12px;
            background: var(--surface);
            border: 1px solid var(--border);
            color: var(--text);
            font-family: inherit;
            font-size: 11px;
            cursor: pointer;
            z-index: 999;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.2s;
        }
        #toggle-btn.visible {
            opacity: 1;
            pointer-events: auto;
        }

        /* Header */
        .header {
            padding: 16px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .header-title {
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--text-dim);
        }
        .header-close {
            background: none;
            border: none;
            color: var(--text-dim);
            cursor: pointer;
            font-size: 16px;
            padding: 4px;
        }
        .header-close:hover {
            color: var(--text);
        }

        /* Body */
        .body {
            flex: 1;
            overflow-y: auto;
            padding: 0;
        }
        .body::-webkit-scrollbar { width: 4px; }
        .body::-webkit-scrollbar-track { background: transparent; }
        .body::-webkit-scrollbar-thumb { background: var(--border); }

        /* Status Row */
        .status-row {
            padding: 12px 16px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            font-size: 11px;
        }
        .status-left {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .status-indicator {
            width: 6px;
            height: 6px;
            background: var(--text-dim);
            border-radius: 50%;
        }
        .status-indicator.on {
            background: var(--success);
        }
        .status-label {
            color: var(--text-dim);
        }
        .status-value {
            font-weight: 600;
            color: var(--accent);
        }
        .status-toggle {
            padding: 4px 8px;
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text-dim);
            font-family: inherit;
            font-size: 10px;
            cursor: pointer;
            transition: all 0.15s;
        }
        .status-toggle:hover {
            border-color: var(--text);
            color: var(--text);
        }

        /* Section */
        .section {
            border-bottom: 1px solid var(--border);
        }
        .section-header {
            padding: 12px 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            cursor: pointer;
            transition: background 0.15s;
        }
        .section-header:hover {
            background: var(--surface-hover);
        }
        .section-title {
            font-size: 10px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: var(--text-dim);
        }
        .section-toggle {
            font-size: 10px;
            color: var(--text-dim);
            transition: transform 0.2s;
        }
        .section.collapsed .section-toggle {
            transform: rotate(-90deg);
        }
        .section-content {
            padding: 0 16px 16px;
        }
        .section.collapsed .section-content {
            display: none;
        }

        /* Input */
        .input-group {
            display: flex;
            gap: 8px;
            margin-bottom: 12px;
        }
        .input {
            flex: 1;
            padding: 10px 12px;
            background: var(--bg);
            border: 1px solid var(--border);
            color: var(--text);
            font-family: inherit;
            font-size: 11px;
        }
        .input:focus {
            outline: none;
            border-color: var(--text-dim);
        }
        .input::placeholder {
            color: var(--text-dim);
        }
        .btn {
            padding: 10px 16px;
            background: var(--accent);
            border: none;
            color: var(--bg);
            font-family: inherit;
            font-size: 11px;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.15s;
        }
        .btn:hover {
            opacity: 0.8;
        }

        /* Zoom Row */
        .zoom-row {
            display: flex;
            align-items: center;
            gap: 4px;
        }
        .zoom-btn {
            width: 32px;
            height: 32px;
            background: var(--bg);
            border: 1px solid var(--border);
            color: var(--text);
            font-size: 14px;
            cursor: pointer;
            transition: all 0.15s;
        }
        .zoom-btn:hover {
            background: var(--surface-hover);
        }
        .zoom-display {
            flex: 1;
            text-align: center;
            font-size: 11px;
            color: var(--text-dim);
        }

        /* Object List */
        .object-list {
            display: flex;
            flex-direction: column;
            gap: 4px;
            margin-bottom: 12px;
        }
        .object-item {
            padding: 10px 12px;
            background: var(--bg);
            border: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
            transition: all 0.15s;
        }
        .object-item:hover {
            background: var(--surface-hover);
        }
        .object-item.active {
            border-color: var(--accent);
        }
        .object-dot {
            width: 4px;
            height: 4px;
            background: var(--text-dim);
            border-radius: 50%;
        }
        .object-item.active .object-dot {
            background: var(--success);
        }
        .object-name {
            flex: 1;
            font-size: 11px;
        }
        .object-status {
            font-size: 9px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-dim);
        }
        .object-status.linked {
            color: var(--success);
        }
        .object-delete {
            background: none;
            border: none;
            color: var(--text-dim);
            cursor: pointer;
            font-size: 12px;
            padding: 2px;
            opacity: 0;
            transition: opacity 0.15s;
        }
        .object-item:hover .object-delete {
            opacity: 1;
        }
        .object-delete:hover {
            color: var(--error);
        }

        /* Object Config */
        .object-config {
            padding: 12px;
            background: var(--bg);
            border: 1px solid var(--border);
            margin-bottom: 12px;
        }
        .config-input {
            width: 100%;
            padding: 8px;
            background: transparent;
            border: none;
            border-bottom: 1px solid var(--border);
            color: var(--text);
            font-family: inherit;
            font-size: 11px;
        }
        .config-input:focus {
            outline: none;
            border-bottom-color: var(--text-dim);
        }

        /* Scene Objects */
        .scene-list {
            max-height: 100px;
            overflow-y: auto;
            border: 1px solid var(--border);
        }
        .scene-item {
            padding: 8px 12px;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 10px;
            cursor: pointer;
            border-bottom: 1px solid var(--border);
            transition: background 0.15s;
        }
        .scene-item:last-child {
            border-bottom: none;
        }
        .scene-item:hover {
            background: var(--surface-hover);
        }
        .scene-item.added {
            opacity: 0.4;
            cursor: default;
        }
        .scene-icon {
            color: var(--text-dim);
        }

        /* Breakpoint Tabs */
        .bp-row {
            display: flex;
            border: 1px solid var(--border);
            margin-bottom: 12px;
        }
        .bp-tab {
            flex: 1;
            padding: 8px;
            background: transparent;
            border: none;
            border-right: 1px solid var(--border);
            color: var(--text-dim);
            font-family: inherit;
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            transition: all 0.15s;
        }
        .bp-tab:last-child {
            border-right: none;
        }
        .bp-tab:hover {
            color: var(--text);
        }
        .bp-tab.active {
            background: var(--accent);
            color: var(--bg);
        }

        /* Keyframe List */
        .kf-list {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }
        .kf-item {
            padding: 10px 12px;
            background: var(--bg);
            border: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
            transition: all 0.15s;
        }
        .kf-item:hover {
            background: var(--surface-hover);
        }
        .kf-item.active {
            border-color: var(--accent);
        }
        .kf-scroll {
            font-size: 12px;
            font-weight: 700;
            min-width: 40px;
        }
        .kf-info {
            flex: 1;
        }
        .kf-name {
            font-size: 11px;
            margin-bottom: 2px;
        }
        .kf-meta {
            font-size: 9px;
            color: var(--text-dim);
        }
        .kf-actions {
            display: flex;
            gap: 4px;
        }
        .kf-action {
            width: 24px;
            height: 24px;
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text-dim);
            font-size: 10px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.15s;
        }
        .kf-action:hover {
            border-color: var(--text);
            color: var(--text);
        }

        /* Add Keyframe */
        .add-kf {
            width: 100%;
            padding: 10px;
            background: transparent;
            border: 1px dashed var(--border);
            color: var(--text-dim);
            font-family: inherit;
            font-size: 10px;
            cursor: pointer;
            transition: all 0.15s;
            margin-top: 8px;
        }
        .add-kf:hover {
            border-color: var(--text);
            color: var(--text);
        }

        /* Transform Section */
        .transform-section {
            display: none;
        }
        .transform-section.visible {
            display: block;
        }

        /* Slider Row */
        .slider-row {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 10px;
        }
        .slider-label {
            width: 16px;
            font-size: 10px;
            font-weight: 600;
            text-align: center;
        }
        .slider-label.x { color: #f87171; }
        .slider-label.y { color: #4ade80; }
        .slider-label.z { color: #60a5fa; }
        .slider-track {
            flex: 1;
            height: 2px;
            background: var(--border);
            position: relative;
        }
        .slider-input {
            width: 100%;
            height: 2px;
            -webkit-appearance: none;
            appearance: none;
            background: transparent;
            cursor: pointer;
        }
        .slider-input::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 12px;
            height: 12px;
            background: var(--accent);
            border-radius: 2px;
            cursor: pointer;
        }
        .slider-value {
            width: 50px;
            padding: 6px;
            background: var(--bg);
            border: 1px solid var(--border);
            color: var(--text);
            font-family: inherit;
            font-size: 10px;
            text-align: center;
        }
        .slider-value:focus {
            outline: none;
            border-color: var(--text-dim);
        }

        /* Footer */
        .footer {
            padding: 12px 16px;
            border-top: 1px solid var(--border);
            display: flex;
            gap: 8px;
        }
        .footer-btn {
            flex: 1;
            padding: 10px;
            background: var(--bg);
            border: 1px solid var(--border);
            color: var(--text-dim);
            font-family: inherit;
            font-size: 10px;
            cursor: pointer;
            transition: all 0.15s;
        }
        .footer-btn:hover {
            border-color: var(--text);
            color: var(--text);
        }

        /* Modal */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.9);
            z-index: 2000;
            display: none;
            align-items: center;
            justify-content: center;
        }
        .modal-overlay.show {
            display: flex;
        }
        .modal {
            background: var(--surface);
            border: 1px solid var(--border);
            width: 500px;
            max-width: 90vw;
            max-height: 80vh;
            overflow: hidden;
        }
        .modal-header {
            padding: 16px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .modal-title {
            font-size: 10px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: var(--text-dim);
        }
        .modal-close {
            background: none;
            border: none;
            color: var(--text-dim);
            cursor: pointer;
            font-size: 14px;
        }
        .modal-tabs {
            display: flex;
            border-bottom: 1px solid var(--border);
        }
        .modal-tab {
            flex: 1;
            padding: 12px;
            background: transparent;
            border: none;
            color: var(--text-dim);
            font-family: inherit;
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            border-bottom: 2px solid transparent;
        }
        .modal-tab.active {
            color: var(--accent);
            border-bottom-color: var(--accent);
        }
        .modal-body {
            padding: 16px;
            max-height: 400px;
            overflow-y: auto;
        }
        .code-block {
            background: var(--bg);
            padding: 16px;
            font-size: 10px;
            color: var(--success);
            white-space: pre-wrap;
            word-break: break-all;
            max-height: 300px;
            overflow-y: auto;
        }
        .modal-footer {
            padding: 12px 16px;
            border-top: 1px solid var(--border);
            display: flex;
            gap: 8px;
            justify-content: flex-end;
        }

        /* Popups */
        .popup {
            position: fixed;
            background: var(--surface);
            border: 1px solid var(--border);
            z-index: 2000;
            display: none;
        }
        .popup.show { display: block; }
        .popup-option {
            padding: 8px 12px;
            cursor: pointer;
            font-size: 11px;
            border-bottom: 1px solid var(--border);
            transition: background 0.15s;
        }
        .popup-option:last-child { border-bottom: none; }
        .popup-option:hover { background: var(--surface-hover); }
        .popup-option.active { background: var(--accent); color: var(--bg); }

        /* Opacity Popup */
        #opacity-popup {
            padding: 12px;
            display: none;
            flex-direction: column;
            align-items: center;
            gap: 8px;
        }
        #opacity-popup.show { display: flex; }
    </style>
    <script type="module" src="https://unpkg.com/@splinetool/runtime@1.9.96/build/runtime.js"></script>
</head>
<body>
    <div id="canvas-container">
        <canvas id="canvas3d"></canvas>
    </div>

    <button id="toggle-btn" onclick="toggleEditor()">OPEN PANEL</button>

    <!-- Popups -->
    <div id="opacity-popup" class="popup">
        <input type="range" style="writing-mode: bt-lr; -webkit-appearance: slider-vertical; width: 4px; height: 80px; accent-color: var(--accent);" min="0" max="100" value="100" oninput="updateOpacityFromSlider(this.value)">
        <span style="font-size: 9px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 1px;">Opacity</span>
    </div>

    <div id="easing-popup" class="popup">
        <div class="popup-option" data-easing="linear">Linear</div>
        <div class="popup-option" data-easing="easeInQuad">Ease In</div>
        <div class="popup-option" data-easing="easeOutQuad">Ease Out</div>
        <div class="popup-option" data-easing="easeInOutQuad">Ease In Out</div>
    </div>

    <!-- Export Modal -->
    <div id="export-modal" class="modal-overlay" onclick="if(event.target===this)closeExportModal()">
        <div class="modal">
            <div class="modal-header">
                <span class="modal-title">Export</span>
                <button class="modal-close" onclick="closeExportModal()">×</button>
            </div>
            <div class="modal-tabs">
                <button class="modal-tab active" onclick="setExportTab('json')">JSON</button>
                <button class="modal-tab" onclick="setExportTab('shopify')">Shopify</button>
            </div>
            <div class="modal-body">
                <div id="export-json-content">
                    <div class="code-block" id="export-json-code"></div>
                </div>
                <div id="export-shopify-content" style="display:none;">
                    <div class="code-block" id="export-shopify-code"></div>
                </div>
            </div>
            <div class="modal-footer">
                <button class="footer-btn" onclick="closeExportModal()">Cancel</button>
                <button class="btn" onclick="copyExportCode()">Copy</button>
            </div>
        </div>
    </div>

    <!-- Main Panel -->
    <div id="editor">
        <div class="header">
            <span class="header-title">3D Config</span>
            <button class="header-close" onclick="toggleEditor()">×</button>
        </div>

        <div class="body">
            <!-- Status -->
            <div class="status-row">
                <div class="status-left">
                    <div class="status-indicator" id="preview-indicator"></div>
                    <span class="status-label" id="preview-label">Preview Off</span>
                </div>
                <span class="status-value" id="scroll-display">0.0%</span>
                <button class="status-toggle" onclick="togglePreview()">Toggle</button>
            </div>

            <!-- Scene -->
            <div class="section">
                <div class="section-header" onclick="toggleSection(this)">
                    <span class="section-title">Scene</span>
                    <span class="section-toggle">▼</span>
                </div>
                <div class="section-content">
                    <div class="input-group">
                        <input type="text" class="input" id="scene-url" placeholder="Spline URL...">
                        <button class="btn" onclick="loadScene()">Load</button>
                    </div>
                    <div class="zoom-row">
                        <button class="zoom-btn" onclick="changeZoom(-0.1)">−</button>
                        <span class="zoom-display" id="zoom-value">100%</span>
                        <button class="zoom-btn" onclick="changeZoom(0.1)">+</button>
                        <button class="zoom-btn" onclick="resetZoom()">↺</button>
                    </div>
                </div>
            </div>

            <!-- Objects -->
            <div class="section">
                <div class="section-header" onclick="toggleSection(this)">
                    <span class="section-title">Objects</span>
                    <span class="section-toggle">▼</span>
                </div>
                <div class="section-content">
                    <div class="object-list" id="object-list"></div>
                    <div id="object-config"></div>
                    
                    <div style="margin-top: 12px; font-size: 9px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px;">Scene Objects</div>
                    <div class="scene-list" id="scene-objects-list">
                        <div class="scene-item" style="cursor:default;">Load scene first</div>
                    </div>
                </div>
            </div>

            <!-- Breakpoints -->
            <div class="section">
                <div class="section-header" onclick="toggleSection(this)">
                    <span class="section-title">Breakpoints</span>
                    <span class="section-toggle">▼</span>
                </div>
                <div class="section-content">
                    <div class="bp-row">
                        <button class="bp-tab active" id="bp-desktop" onclick="setBreakpoint('desktop')">Desktop</button>
                        <button class="bp-tab" id="bp-tablet" onclick="setBreakpoint('tablet')">Tablet</button>
                        <button class="bp-tab" id="bp-mobile" onclick="setBreakpoint('mobile')">Mobile</button>
                    </div>
                </div>
            </div>

            <!-- Keyframes -->
            <div class="section">
                <div class="section-header" onclick="toggleSection(this)">
                    <span class="section-title" id="keyframes-title">Keyframes</span>
                    <span class="section-toggle">▼</span>
                </div>
                <div class="section-content">
                    <div class="kf-list" id="keyframe-list"></div>
                    <button class="add-kf" onclick="addKeyframe()">+ Add Keyframe</button>
                </div>
            </div>

            <!-- Transform -->
            <div class="transform-section" id="transform-section">
                <div class="section">
                    <div class="section-header" onclick="toggleSection(this)">
                        <span class="section-title">Trigger</span>
                        <span class="section-toggle">▼</span>
                    </div>
                    <div class="section-content">
                        <div class="slider-row">
                            <span class="slider-label">%</span>
                            <div class="slider-track">
                                <input type="range" class="slider-input" id="trigger-slider" min="0" max="100" value="0" data-type="scroll" oninput="updateTransform(this)">
                            </div>
                            <input type="number" class="slider-value" data-type="scroll" min="0" max="100" oninput="updateTransform(this)">
                        </div>
                        <button class="add-kf" onclick="setTriggerFromScroll()" style="margin-top:0;">Set from current scroll</button>
                    </div>
                </div>

                <div class="section">
                    <div class="section-header" onclick="toggleSection(this)">
                        <span class="section-title">Position</span>
                        <span class="section-toggle">▼</span>
                    </div>
                    <div class="section-content">
                        <div class="slider-row">
                            <span class="slider-label x">X</span>
                            <div class="slider-track">
                                <input type="range" class="slider-input" min="-500" max="500" value="0" data-type="pos" data-axis="x" oninput="updateTransform(this)">
                            </div>
                            <input type="number" class="slider-value" data-type="pos" data-axis="x" oninput="updateTransform(this)">
                        </div>
                        <div class="slider-row">
                            <span class="slider-label y">Y</span>
                            <div class="slider-track">
                                <input type="range" class="slider-input" min="-500" max="500" value="0" data-type="pos" data-axis="y" oninput="updateTransform(this)">
                            </div>
                            <input type="number" class="slider-value" data-type="pos" data-axis="y" oninput="updateTransform(this)">
                        </div>
                        <div class="slider-row">
                            <span class="slider-label z">Z</span>
                            <div class="slider-track">
                                <input type="range" class="slider-input" min="-500" max="500" value="0" data-type="pos" data-axis="z" oninput="updateTransform(this)">
                            </div>
                            <input type="number" class="slider-value" data-type="pos" data-axis="z" oninput="updateTransform(this)">
                        </div>
                    </div>
                </div>

                <div class="section">
                    <div class="section-header" onclick="toggleSection(this)">
                        <span class="section-title">Rotation</span>
                        <span class="section-toggle">▼</span>
                    </div>
                    <div class="section-content">
                        <div class="slider-row">
                            <span class="slider-label x">X</span>
                            <div class="slider-track">
                                <input type="range" class="slider-input" min="-180" max="180" value="0" data-type="rot" data-axis="x" oninput="updateTransform(this)">
                            </div>
                            <input type="number" class="slider-value" data-type="rot" data-axis="x" oninput="updateTransform(this)">
                        </div>
                        <div class="slider-row">
                            <span class="slider-label y">Y</span>
                            <div class="slider-track">
                                <input type="range" class="slider-input" min="-180" max="180" value="0" data-type="rot" data-axis="y" oninput="updateTransform(this)">
                            </div>
                            <input type="number" class="slider-value" data-type="rot" data-axis="y" oninput="updateTransform(this)">
                        </div>
                        <div class="slider-row">
                            <span class="slider-label z">Z</span>
                            <div class="slider-track">
                                <input type="range" class="slider-input" min="-180" max="180" value="0" data-type="rot" data-axis="z" oninput="updateTransform(this)">
                            </div>
                            <input type="number" class="slider-value" data-type="rot" data-axis="z" oninput="updateTransform(this)">
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="footer">
            <button class="footer-btn" onclick="openExportModal()">Export</button>
            <button class="footer-btn" onclick="downloadJSON()">Download</button>
        </div>
    </div>

    <script type="module">
        import { Application } from 'https://unpkg.com/@splinetool/runtime@1.9.96/build/runtime.js';

        const state = {
            app: null,
            objects: [],
            activeObjId: null,
            activeKeyframeId: null,
            objectCache: new Map(),
            currentScroll: 0,
            previewMode: false,
            activeBreakpoint: 'desktop',
            breakpointWidths: { desktop: 1024, tablet: 768, mobile: 0 },
            zoomLevel: 1.0,
            sceneObjects: []
        };

        window.editorState = state;

        // Section toggle
        window.toggleSection = function(header) {
            header.parentElement.classList.toggle('collapsed');
        }

        window.toggleEditor = function() {
            const editor = document.getElementById('editor');
            const toggle = document.getElementById('toggle-btn');
            if (editor.classList.contains('hidden')) {
                editor.classList.remove('hidden');
                toggle.classList.remove('visible');
            } else {
                editor.classList.add('hidden');
                toggle.classList.add('visible');
            }
        }

        window.togglePreview = function() {
            state.previewMode = !state.previewMode;
            const indicator = document.getElementById('preview-indicator');
            const label = document.getElementById('preview-label');
            if (state.previewMode) {
                indicator.classList.add('on');
                label.innerText = "Preview On";
                requestAnimationFrame(renderFrame);
            } else {
                indicator.classList.remove('on');
                label.innerText = "Preview Off";
            }
        }

        window.addEventListener('load', () => {
            const savedUrl = localStorage.getItem('spline_tool_url');
            if (savedUrl) {
                document.getElementById('scene-url').value = savedUrl;
                loadScene();
            }
            addObject(true);
        });

        window.loadScene = async function() {
            const url = document.getElementById('scene-url').value;
            if (!url) return;
            localStorage.setItem('spline_tool_url', url);
            const canvas = document.getElementById('canvas3d');
            if (!state.app) state.app = new Application(canvas);
            try {
                await state.app.load(url);
                state.objectCache.clear();
                state.zoomLevel = 1.0;
                document.getElementById('zoom-value').innerText = '100%';
                
                state.sceneObjects = [];
                function findSceneObjects(node) {
                    if (node.name && (node.name.toLowerCase().includes('scene') || node.type === 'Scene')) {
                        if (node.children) {
                            node.children.forEach(child => {
                                if (child.name && 
                                    !child.name.startsWith('__') && 
                                    !child.name.toLowerCase().includes('light') &&
                                    !child.name.toLowerCase().includes('camera') &&
                                    !child.name.toLowerCase().includes('invisible') &&
                                    child.type !== 'DirectionalLight' && 
                                    child.type !== 'AmbientLight' && 
                                    child.type !== 'PointLight' && 
                                    child.type !== 'SpotLight') {
                                    state.sceneObjects.push({ name: child.name, type: child.type || 'Object', uuid: child.uuid });
                                }
                            });
                        }
                        return true;
                    }
                    if (node.children) {
                        for (const child of node.children) {
                            if (findSceneObjects(child)) return true;
                        }
                    }
                    return false;
                }
                if (state.app._scene) findSceneObjects(state.app._scene);
                
                renderSceneObjects();
                renderObjects();
            } catch (e) {
                console.error(e);
                alert("Failed to load scene");
            }
        }
        
        function renderSceneObjects() {
            const container = document.getElementById('scene-objects-list');
            if (state.sceneObjects.length === 0) {
                container.innerHTML = '<div class="scene-item" style="cursor:default;">Load scene first</div>';
                return;
            }
            const addedNames = state.objects.map(o => o.name);
            container.innerHTML = state.sceneObjects.map(obj => {
                const isAdded = addedNames.includes(obj.name);
                return `<div class="scene-item ${isAdded ? 'added' : ''}" onclick="${isAdded ? '' : `addObjectFromScene('${obj.name}')`}">
                    <span class="scene-icon">${isAdded ? '✓' : '◆'}</span>
                    <span>${obj.name}</span>
                </div>`;
            }).join('');
        }
        
        window.addObjectFromScene = function(name) {
            if (state.objects.some(o => o.name === name)) return;
            const id = 'obj_' + Date.now();
            const obj = { id, name, keyframes: { desktop: [], tablet: [], mobile: [] } };
            state.objects.push(obj);
            selectObject(id);
            renderObjects();
            renderSceneObjects();
        }

        window.changeZoom = function(delta) {
            state.zoomLevel = Math.max(0.1, Math.min(3, state.zoomLevel + delta));
            state.zoomLevel = parseFloat(state.zoomLevel.toFixed(1));
            document.getElementById('zoom-value').innerText = Math.round(state.zoomLevel * 100) + '%';
            if (state.app) try { state.app.setZoom(state.zoomLevel); } catch(e){}
        }

        window.resetZoom = function() {
            state.zoomLevel = 1.0;
            document.getElementById('zoom-value').innerText = '100%';
            if (state.app) try { state.app.setZoom(1); } catch(e){}
        }

        window.addEventListener('scroll', () => {
            const docH = document.body.scrollHeight - window.innerHeight;
            state.currentScroll = docH > 0 ? (window.scrollY / docH) * 100 : 0;
            document.getElementById('scroll-display').innerText = state.currentScroll.toFixed(1) + '%';
            if (state.previewMode) requestAnimationFrame(renderFrame);
        });

        window.setBreakpoint = function(bp) {
            state.activeBreakpoint = bp;
            document.querySelectorAll('.bp-tab').forEach(t => t.classList.remove('active'));
            document.getElementById('bp-' + bp).classList.add('active');
            document.getElementById('keyframes-title').innerText = `Keyframes · ${bp}`;
            renderKeyframes();
        }

        window.addObject = function(autoSelect = true) {
            const id = 'obj_' + Date.now();
            const obj = { id, name: 'Object ' + (state.objects.length + 1), keyframes: { desktop: [], tablet: [], mobile: [] } };
            state.objects.push(obj);
            if (autoSelect || state.objects.length === 1) selectObject(id);
            renderObjects();
        }

        window.deleteObject = function(id) {
            if (state.objects.length <= 1) return;
            state.objects = state.objects.filter(o => o.id !== id);
            if (state.activeObjId === id) {
                state.activeObjId = state.objects[0]?.id || null;
                state.activeKeyframeId = null;
            }
            renderObjects();
            renderKeyframes();
        }

        window.selectObject = function(id) {
            state.activeObjId = id;
            state.activeKeyframeId = null;
            const obj = state.objects.find(o => o.id === id);
            if (!obj) return;
            if (Array.isArray(obj.keyframes)) obj.keyframes = { desktop: obj.keyframes, tablet: [], mobile: [] };
            document.getElementById('transform-section').classList.remove('visible');
            renderObjects();
            renderKeyframes();
        }

        window.updateObjectName = function(id, name) {
            const obj = state.objects.find(o => o.id === id);
            if (!obj) return;
            state.objectCache.delete(obj.name);
            obj.name = name;
            if (state.app && name) {
                try { const found = state.app.findObjectByName(name); if (found) state.objectCache.set(name, found); } catch(e) {}
            }
            renderObjects();
        }

        function renderObjects() {
            const listContainer = document.getElementById('object-list');
            const configContainer = document.getElementById('object-config');

            listContainer.innerHTML = state.objects.map(o => {
                let isLinked = false;
                if (state.app && o.name) {
                    try { isLinked = !!state.app.findObjectByName(o.name); } catch(e) {}
                }
                return `<div class="object-item ${o.id === state.activeObjId ? 'active' : ''}" onclick="selectObject('${o.id}')">
                    <span class="object-dot"></span>
                    <span class="object-name">${o.name || 'Unnamed'}</span>
                    <span class="object-status ${isLinked ? 'linked' : ''}">${isLinked ? 'Linked' : 'Not Found'}</span>
                    ${state.objects.length > 1 ? `<button class="object-delete" onclick="event.stopPropagation(); deleteObject('${o.id}')">×</button>` : ''}
                </div>`;
            }).join('') + `<button class="add-kf" onclick="addObject()">+ Add Object</button>`;

            const obj = state.objects.find(o => o.id === state.activeObjId);
            if (!obj) { configContainer.innerHTML = ''; return; }

            configContainer.innerHTML = `<div class="object-config">
                <input type="text" class="config-input" value="${obj.name || ''}" placeholder="Object name" oninput="updateObjectName('${obj.id}', this.value)">
            </div>`;
            
            renderSceneObjects();
        }

        function getKeyframes(obj) {
            if (!obj) return [];
            return obj.keyframes[state.activeBreakpoint] || [];
        }

        window.addKeyframe = function() {
            const obj = state.objects.find(o => o.id === state.activeObjId);
            if (!obj) return alert("Select an object first");
            const kfs = getKeyframes(obj);

            let pos = { x: 0, y: 0, z: 0 }, rot = { x: 0, y: 0, z: 0 };
            if (state.app) {
                let splineObj = state.objectCache.get(obj.name);
                if (!splineObj) try { splineObj = state.app.findObjectByName(obj.name); state.objectCache.set(obj.name, splineObj); } catch(e){}
                if (splineObj) {
                    pos = { x: Math.round(splineObj.position.x), y: Math.round(splineObj.position.y), z: Math.round(splineObj.position.z) };
                    rot = { x: Math.round(splineObj.rotation.x * 180/Math.PI), y: Math.round(splineObj.rotation.y * 180/Math.PI), z: Math.round(splineObj.rotation.z * 180/Math.PI) };
                }
            }

            const kf = { id: 'kf_' + Date.now(), name: 'Position ' + (kfs.length + 1), scroll: Math.round(state.currentScroll), pos, rot, op: 100, easing: 'linear' };
            kfs.push(kf);
            selectKeyframe(kf.id);
            renderKeyframes();
        }

        window.deleteKeyframe = function(id) {
            const obj = state.objects.find(o => o.id === state.activeObjId);
            if (!obj) return;
            const kfs = getKeyframes(obj);
            const idx = kfs.findIndex(k => k.id === id);
            if (idx > -1) kfs.splice(idx, 1);
            if (state.activeKeyframeId === id) state.activeKeyframeId = kfs[0]?.id || null;
            renderKeyframes();
            if (!state.activeKeyframeId) document.getElementById('transform-section').classList.remove('visible');
        }

        window.selectKeyframe = function(id) {
            state.activeKeyframeId = id;
            const obj = state.objects.find(o => o.id === state.activeObjId);
            const kf = getKeyframes(obj).find(k => k.id === id);
            if (!kf) return;

            document.getElementById('transform-section').classList.add('visible');
            document.querySelectorAll('[data-type="scroll"]').forEach(el => el.value = kf.scroll);
            ['x','y','z'].forEach(axis => {
                document.querySelectorAll(`[data-type="pos"][data-axis="${axis}"]`).forEach(el => el.value = kf.pos[axis]);
                document.querySelectorAll(`[data-type="rot"][data-axis="${axis}"]`).forEach(el => el.value = kf.rot[axis]);
            });
            renderKeyframes();

            if (!state.previewMode && state.app) {
                let splineObj = state.objectCache.get(obj.name);
                if (!splineObj) try { splineObj = state.app.findObjectByName(obj.name); state.objectCache.set(obj.name, splineObj); } catch(e){}
                if (splineObj) {
                    splineObj.position.set(kf.pos.x, kf.pos.y, kf.pos.z);
                    splineObj.rotation.set(kf.rot.x * Math.PI/180, kf.rot.y * Math.PI/180, kf.rot.z * Math.PI/180);
                    forceOpacity(splineObj, (kf.op || 100) / 100);
                }
            }
        }

        window.updateKeyframeName = function(id, name) {
            const obj = state.objects.find(o => o.id === state.activeObjId);
            const kf = getKeyframes(obj).find(k => k.id === id);
            if (kf) kf.name = name;
        }

        function renderKeyframes() {
            const obj = state.objects.find(o => o.id === state.activeObjId);
            const container = document.getElementById('keyframe-list');

            if (!obj) { container.innerHTML = '<div style="color:var(--text-dim);font-size:11px;padding:8px;">Select object first</div>'; return; }
            const kfs = getKeyframes(obj);
            if (kfs.length === 0) { container.innerHTML = ''; return; }

            const easingLabels = { linear: 'Lin', easeInQuad: 'In', easeOutQuad: 'Out', easeInOutQuad: 'IO' };

            container.innerHTML = kfs.map(kf => `<div class="kf-item ${kf.id === state.activeKeyframeId ? 'active' : ''}" onclick="selectKeyframe('${kf.id}')">
                <span class="kf-scroll">${kf.scroll}%</span>
                <div class="kf-info">
                    <div class="kf-name">${kf.name || 'Unnamed'}</div>
                    <div class="kf-meta">Op: ${kf.op || 100}% · ${easingLabels[kf.easing] || 'Lin'}</div>
                </div>
                <div class="kf-actions">
                    <button class="kf-action" onclick="event.stopPropagation(); showOpacitySlider('${kf.id}', this)">◐</button>
                    <button class="kf-action" onclick="event.stopPropagation(); toggleEasingPicker('${kf.id}', this)">⚡</button>
                    <button class="kf-action" onclick="event.stopPropagation(); deleteKeyframe('${kf.id}')">×</button>
                </div>
            </div>`).join('');
        }

        let activeOpacityKfId = null;
        window.showOpacitySlider = function(kfId, el) {
            activeOpacityKfId = kfId;
            const popup = document.getElementById('opacity-popup');
            const rect = el.getBoundingClientRect();
            popup.style.left = (rect.left - 30) + 'px';
            popup.style.top = (rect.bottom + 8) + 'px';
            popup.classList.add('show');
            const obj = state.objects.find(o => o.id === state.activeObjId);
            const kf = getKeyframes(obj).find(k => k.id === kfId);
            if (kf) popup.querySelector('input').value = (kf.op || 100);
        }

        window.updateOpacityFromSlider = function(val) {
            if (!activeOpacityKfId) return;
            const obj = state.objects.find(o => o.id === state.activeObjId);
            const kf = getKeyframes(obj).find(k => k.id === activeOpacityKfId);
            if (kf) kf.op = parseInt(val);
        }

        document.addEventListener('click', e => {
            const popup = document.getElementById('opacity-popup');
            if (popup && !popup.contains(e.target) && !e.target.classList.contains('kf-action')) {
                popup.classList.remove('show');
                activeOpacityKfId = null;
                renderKeyframes();
            }
        });

        let activeEasingKfId = null;
        window.toggleEasingPicker = function(kfId, el) {
            activeEasingKfId = kfId;
            const popup = document.getElementById('easing-popup');
            const rect = el.getBoundingClientRect();
            popup.style.left = (rect.left - 40) + 'px';
            popup.style.top = (rect.bottom + 8) + 'px';
            popup.classList.add('show');
            const obj = state.objects.find(o => o.id === state.activeObjId);
            const kf = getKeyframes(obj).find(k => k.id === kfId);
            popup.querySelectorAll('.popup-option').forEach(opt => opt.classList.toggle('active', opt.dataset.easing === kf?.easing));
        }

        document.querySelectorAll('.popup-option').forEach(opt => {
            opt.addEventListener('click', () => {
                if (!activeEasingKfId) return;
                const obj = state.objects.find(o => o.id === state.activeObjId);
                const kf = getKeyframes(obj).find(k => k.id === activeEasingKfId);
                if (kf) kf.easing = opt.dataset.easing;
                document.getElementById('easing-popup').classList.remove('show');
                activeEasingKfId = null;
                renderKeyframes();
            });
        });

        window.setTriggerFromScroll = function() {
            const obj = state.objects.find(o => o.id === state.activeObjId);
            const kf = getKeyframes(obj).find(k => k.id === state.activeKeyframeId);
            if (!kf) return;
            const currentVal = parseFloat(state.currentScroll.toFixed(1));
            kf.scroll = currentVal;
            document.querySelectorAll('[data-type="scroll"]').forEach(e => e.value = currentVal);
            renderKeyframes();
        }

        window.updateTransform = function(el) {
            const obj = state.objects.find(o => o.id === state.activeObjId);
            const kf = getKeyframes(obj).find(k => k.id === state.activeKeyframeId);
            if (!kf) return;

            const type = el.dataset.type, axis = el.dataset.axis, val = parseFloat(el.value) || 0;

            if (type === 'scroll') {
                kf.scroll = val;
                document.querySelectorAll('[data-type="scroll"]').forEach(e => e.value = val);
                const docH = document.body.scrollHeight - window.innerHeight;
                if (docH > 0) window.scrollTo(0, (val / 100) * docH);
            } else if (type === 'pos') {
                kf.pos[axis] = val;
                document.querySelectorAll(`[data-type="pos"][data-axis="${axis}"]`).forEach(e => e.value = val);
            } else if (type === 'rot') {
                kf.rot[axis] = val;
                document.querySelectorAll(`[data-type="rot"][data-axis="${axis}"]`).forEach(e => e.value = val);
            }

            renderKeyframes();

            if (!state.previewMode) {
                let splineObj = state.objectCache.get(obj.name);
                if (!splineObj && state.app) try { splineObj = state.app.findObjectByName(obj.name); } catch(e){}
                if (splineObj) {
                    splineObj.position.set(kf.pos.x, kf.pos.y, kf.pos.z);
                    splineObj.rotation.set(kf.rot.x * Math.PI/180, kf.rot.y * Math.PI/180, kf.rot.z * Math.PI/180);
                    forceOpacity(splineObj, (kf.op || 100) / 100);
                }
            }
        }

        function cloneMaterial(node) {
            if (!node.material) return;
            if (!Array.isArray(node.material)) {
                if (!node.material._isCloned) {
                    node.material = node.material.clone();
                    node.material._isCloned = true;
                    node.material.transparent = true;
                    node.material.depthWrite = false;
                    node.material.needsUpdate = true;
                }
                return;
            }
            node.material = node.material.map(mat => {
                if (!mat._isCloned) {
                    const cloned = mat.clone();
                    cloned._isCloned = true;
                    cloned.transparent = true;
                    cloned.depthWrite = false;
                    cloned.needsUpdate = true;
                    return cloned;
                }
                return mat;
            });
        }

        function forceOpacity(node, opacityVal) {
            if (opacityVal <= 0.01) { node.visible = false; return; }
            node.visible = true;
            cloneMaterial(node);
            if (node.material) {
                const mats = Array.isArray(node.material) ? node.material : [node.material];
                mats.forEach(m => { m.opacity = opacityVal; m.transparent = true; m.depthWrite = false; m.needsUpdate = true; });
            }
            if (node.children) node.children.forEach(child => forceOpacity(child, opacityVal));
        }

        const easingFunctions = {
            linear: t => t,
            easeInQuad: t => t * t,
            easeOutQuad: t => t * (2 - t),
            easeInOutQuad: t => t < 0.5 ? 2 * t * t : -1 + (4 - 2 * t) * t
        };

        function renderFrame() {
            if (!state.app) return;
            const scroll = state.currentScroll;
            const w = window.innerWidth;
            let targetBp = 'mobile';
            if (w >= state.breakpointWidths.desktop) targetBp = 'desktop';
            else if (w >= state.breakpointWidths.tablet) targetBp = 'tablet';

            state.objects.forEach(objDef => {
                let splineObj = state.objectCache.get(objDef.name);
                if (!splineObj) try { splineObj = state.app.findObjectByName(objDef.name); state.objectCache.set(objDef.name, splineObj); } catch(e){}
                if (!splineObj) return;

                const kfs = objDef.keyframes[targetBp] || [];
                if (kfs.length === 0) return;

                const sorted = [...kfs].sort((a,b) => a.scroll - b.scroll);
                let prev = sorted[0], next = sorted[0];
                for (let i = 0; i < sorted.length; i++) {
                    if (sorted[i].scroll <= scroll) prev = sorted[i];
                    if (sorted[i].scroll >= scroll && next.scroll < scroll) next = sorted[i];
                }
                if (next.scroll < scroll) next = sorted[sorted.length - 1];

                let t = 0;
                if (prev !== next && next.scroll !== prev.scroll) t = (scroll - prev.scroll) / (next.scroll - prev.scroll);
                else if (scroll >= next.scroll) t = 1;

                const easeFn = easingFunctions[next.easing] || easingFunctions.linear;
                t = easeFn(Math.max(0, Math.min(1, t)));
                const lerp = (a, b) => a + (b - a) * t;

                splineObj.position.set(lerp(prev.pos.x, next.pos.x), lerp(prev.pos.y, next.pos.y), lerp(prev.pos.z, next.pos.z));
                splineObj.rotation.set(lerp(prev.rot.x, next.rot.x) * Math.PI/180, lerp(prev.rot.y, next.rot.y) * Math.PI/180, lerp(prev.rot.z, next.rot.z) * Math.PI/180);
                forceOpacity(splineObj, lerp(prev.op || 100, next.op || 100) / 100);
            });
        }

        let currentExportTab = 'json';

        function getExportData() {
            return { breakpointWidths: state.breakpointWidths, objects: state.objects.map(o => ({ name: o.name, keyframes: o.keyframes })) };
        }

        function getShopifyCode() {
            const sceneUrl = document.getElementById('scene-url').value || 'YOUR_SPLINE_URL';
            const config = getExportData();
            return `<!-- Elevia 3D -->\n<script type="module">\nimport { Application } from 'https://unpkg.com/@splinetool/runtime@1.9.96/build/runtime.js';\nconst CONFIG = ${JSON.stringify(config, null, 2)};\n// ... full code ...\n<\/script>`;
        }

        window.openExportModal = function() {
            document.getElementById('export-modal').classList.add('show');
            document.getElementById('export-json-code').textContent = JSON.stringify(getExportData(), null, 2);
            document.getElementById('export-shopify-code').textContent = getShopifyCode();
        }

        window.closeExportModal = function() { document.getElementById('export-modal').classList.remove('show'); }

        window.setExportTab = function(tab) {
            currentExportTab = tab;
            document.querySelectorAll('.modal-tab').forEach(t => t.classList.remove('active'));
            event.target.classList.add('active');
            document.getElementById('export-json-content').style.display = tab === 'json' ? 'block' : 'none';
            document.getElementById('export-shopify-content').style.display = tab === 'shopify' ? 'block' : 'none';
        }

        window.copyExportCode = function() {
            const code = currentExportTab === 'json' ? JSON.stringify(getExportData(), null, 2) : getShopifyCode();
            navigator.clipboard.writeText(code);
            alert('Copied!');
        }

        window.downloadJSON = function() {
            const blob = new Blob([JSON.stringify(getExportData(), null, 2)], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url; a.download = 'spline-config.json'; a.click();
            URL.revokeObjectURL(url);
        }
    </script>
</body>
</html>
